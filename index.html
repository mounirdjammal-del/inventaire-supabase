      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Famille * <span style="font-weight:400;color:var(--text3);font-size:11px">(tapez pour rechercher)</span></label>
          <input type="text" id="n-fam" list="famList" placeholder="Rechercher une famille…" oninput="nFamInput()" autocomplete="off">
          <datalist id="famList">${fams.map(f => `<option value="${f}"></option>`).join('')}</datalist>
        </div>
        <div class="form-group">
          <label class="form-label">Article * <span style="font-weight:400;color:var(--text3);font-size:11px">(tapez pour rechercher)</span></label>

      <div class="form-row">

          <label class="btn btn-sm" style="cursor:pointer"><i class="ti ti-photo"></i> Galerie<input type="file" accept="image/*" multiple style="display:none" onchange="handleNewPhotoCapture(event)"></label>
        </div>
        
      </div>

      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveNew()"><i class="ti ti-plus"></i> Ajouter</button>
      </div>
    </div>`);

  // Réinitialiser le buffer de photos
  window._newItemPhotos = [];
  // Stocker la liste complète pour les fonctions oninput
  window._N_ALL_ARTICLES = allArticles;
  // Au démarrage, pas de famille sélectionnée → tous les articles disponibles
  refreshArticleDatalist('');
  refreshMarquesDatalist();
  onMarqueChange('n');
}

// Gestion des photos en attente pour le nouvel article (avant qu'il ait un CBI)
async function handleNewPhotoCapture(event) {
  const files = [...event.target.files];
  if (!files.length) return;
  if (!window._newItemPhotos) window._newItemPhotos = [];
  // Compresser TOUTES les photos en parallèle (gain notable sur multi-photos)
  const compressed = await Promise.all(files.map(f =>
    compressImage(f, 1200, 0.82)
      .then(blob => ({ blob, previewUrl: URL.createObjectURL(blob), name: f.name }))
      .catch(e => { console.error('Compression photo', e); return null; })
  ));
  for (const p of compressed) if (p) window._newItemPhotos.push(p);
  renderNewItemPhotoThumbs();
  event.target.value = '';
}

function renderNewItemPhotoThumbs() {
  const wrap = document.getElementById('n-photo-thumbs');
  const cnt = document.getElementById('n-photo-count');
  if (!wrap) return;
  const list = window._newItemPhotos || [];
  if (cnt) cnt.textContent = `(${list.length})`;
  if (!list.length) {
    wrap.innerHTML = '<div class="txt-12-muted">Aucune photo</div>';
    return;
  }
  wrap.innerHTML = list.map((p, i) =>
    `<div style="position:relative;display:inline-block;margin:4px">
      <img src="${p.previewUrl}" alt="photo" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:0.5px solid var(--border)">
      <button onclick="removeNewItemPhoto(${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--danger-bg);color:var(--danger-txt);border:none;cursor:pointer;font-size:12px">✕</button>
    </div>`
  ).join('');
}

function removeNewItemPhoto(idx) {
  if (!window._newItemPhotos) return;
  const p = window._newItemPhotos[idx];
  if (p && p.previewUrl) URL.revokeObjectURL(p.previewUrl);
  window._newItemPhotos.splice(idx, 1);
  renderNewItemPhotoThumbs();
}

// Quand l'utilisateur tape dans Famille : filtrer la datalist des articles
function nFamInput() {
  const famVal = document.getElementById('n-fam').value.trim();
  refreshArticleDatalist(famVal);
}

// Quand l'utilisateur tape dans Article : auto-détecter la famille
function nArtInput() {
  const artVal = document.getElementById('n-art').value.trim();
  const hint = document.getElementById('n-art-hint');
  if (!artVal) { if (hint) hint.style.display = 'none'; return; }
  // Si l'article tapé correspond exactement à un article connu, auto-remplir la famille
  const all = window._N_ALL_ARTICLES || [];
  const exact = all.find(x => x.art.toLowerCase() === artVal.toLowerCase());
  if (exact) {
    document.getElementById('n-fam').value = exact.fam;
    if (hint) { hint.style.display = 'block'; hint.style.color = 'var(--success-txt)'; hint.innerHTML = `✓ Famille auto-renseignée : <strong>${exact.fam}</strong>`; }
  } else {
    if (hint) { hint.style.display = 'block'; hint.style.color = 'var(--warn-txt)'; hint.innerHTML = `⚠ Nouvel article — saisissez aussi la famille`; }
  }
}

// Met à jour la datalist articles selon la famille (vide = tous)
function refreshArticleDatalist(famVal) {
  const dl = document.getElementById('artList');
  if (!dl) return;
  const all = window._N_ALL_ARTICLES || [];
  let opts = [];
  if (famVal && FAMS[famVal]) {
    // Famille connue : afficher uniquement ses articles
    opts = FAMS[famVal].map(a => `<option value="${a}"></option>`);
  } else {
    // Pas de famille ou famille inconnue : afficher tous les articles avec leur famille en label
    opts = all.map(x => `<option value="${x.art}">${x.fam}</option>`);
  }
  dl.innerHTML = opts.join('');
}
function checkCbiField(inp) { const cbi = inp.value.trim(); const msg = document.getElementById('n-cbi-msg'); if (!cbi || !msg) return; const exist = findItemByCbi(cbi); if (exist) { inp.style.borderColor = 'var(--danger-txt)'; msg.style.cssText = 'font-size:11px;margin-top:-6px;margin-bottom:4px;display:block;color:var(--danger-txt)'; msg.innerHTML = '⚠ Déjà existant : ' + exist.art + ' (' + exist.bureau + ')'; } else { inp.style.borderColor = 'var(--success-txt)'; msg.style.cssText = 'font-size:11px;margin-top:-6px;margin-bottom:4px;display:block;color:var(--success-txt)'; msg.textContent = '✓ Code barre disponible'; } }
function checkCbeField(inp) { const cbe = inp.value.trim(); const msg = document.getElementById('n-cbe-msg'); if (!cbe || !msg) return; const exist = findItemByCbe(cbe); if (exist) { inp.style.borderColor = 'var(--success-txt)'; msg.style.cssText = 'font-size:11px;margin-top:-6px;margin-bottom:4px;display:block;color:var(--text2)'; msg.innerHTML = '<i class="ti ti-map-pin" style="font-size:11px"></i> Emplacement : ' + esc(exist.bureau) + ' (' + esc(exist.bat) + ')'; } else { inp.style.borderColor = ''; msg.style.cssText = 'font-size:11px;margin-top:-6px;margin-bottom:4px;display:block;color:var(--text3)'; msg.textContent = 'Nouveau code barre emplacement'; } }
async function saveNew() {
  const cbiRaw = document.getElementById('n-cbi').value.trim();
  const cbi = cbiRaw.replace(/\s+/g, ''); // retirer les espaces parasites
  const cbe = document.getElementById('n-cbe').value.trim();
  if (!cbi) { showToast('Code barre IMMO requis', 'warn'); return; }
  // Contrôle de doublon robuste (gère espaces, .0, casse via findItemByCbi normalisé)
  const existCbi = findItemByCbi(cbi);
  if (existCbi) { showDoublonModal('cbi', existCbi); return; }
  // NB : le CBE (code barre emplacement) est PARTAGÉ entre tous les articles d'un même bureau.
  // On ne bloque donc PAS si le CBE existe déjà — c'est le comportement normal d'ajouter
  // un article sur un emplacement existant. L'unicité du CBE est contrôlée uniquement
  // à la création/modification d'un emplacement (findCbeConflict).

  const famNom = document.getElementById('n-fam').value.trim();
  const artNom = document.getElementById('n-art').value.trim();
  if (!famNom || !artNom) { showToast('Famille et Article sont requis', 'warn'); return; }

  // ── RÉFÉRENTIEL : créer Famille si nouvelle ──
  let famille_id = null;
  for (const fid in REL_FAMS) if (REL_FAMS[fid].famille_nom === famNom) { famille_id = fid; break; }
  if (!famille_id) {
    famille_id = genFamId();
    REL_FAMS[famille_id] = { famille_id, famille_nom: famNom };
    // Maintenir FAMS local pour les listes déroulantes
    if (!FAMS[famNom]) FAMS[famNom] = [];
    if (gTok) {
      try { await sAppend('Familles', [[famille_id, famNom]]); }
      catch(e) { console.error('Append Famille', e); }
    }
    showToast(`Nouvelle famille créée : ${famNom}`, 'info');
  }

  // ── RÉFÉRENTIEL : créer Article si nouveau ──
  let article_id = null;
  for (const aid in REL_ARTS) if (REL_ARTS[aid].article_nom === artNom && REL_ARTS[aid].famille_id === famille_id) { article_id = aid; break; }
  if (!article_id) {
    article_id = genArtId();
    REL_ARTS[article_id] = { article_id, article_nom: artNom, famille_id, famille_nom: famNom };
    // Maintenir FAMS local
    if (!FAMS[famNom].includes(artNom)) FAMS[famNom].push(artNom);
    if (gTok) {
      try { await sAppend('Articles', [[article_id, artNom, famille_id]]); }
      catch(e) { console.error('Append Article', e); }
    }
    showToast(`Nouvel article ajouté au référentiel : ${artNom}`, 'info');
  }

  // Trouver emp_id depuis le référentiel
  const emp_id = curLoc.bureau ? findEmpIdByLocation(curLoc.site, curLoc.bat, curLoc.etage, curLoc.bureau) : '';

  const item = {
    ...curLoc, cbi, cbe,
    emp_id, article_id,
    fam: famNom,
    art: artNom,
    marque: document.getElementById('n-marque').value,
    modele: document.getElementById('n-modele').value,
    serie: document.getElementById('n-serie').value,
    qty: parseInt(document.getElementById('n-qty').value) || 1,
    serv: document.getElementById('n-sv').value,
    renouv: document.getElementById('n-rv').value,
    obs: document.getElementById('n-obs').value,
    prod: (document.getElementById('n-prod')?.value || '').trim(),
    dir: '', patrim: '', nom_inv: '',
    _new: true, _addedBy: currentUser, _addedAt: Date.now()
  };
  newItems.push(item);
  invalidateAllItemsCache();
    invalidateCbeIndex();
  updates[cbi] = { serv: item.serv, renouv: item.renouv, obs: item.obs, by: currentUser, ts: Date.now() };
  // Mettre à jour les index
  CBI_INDEX[cbi] = item;
  _CBI_NORM_INDEX[normCbi(cbi)] = item;
  if (item.cbe) CBE_INDEX[item.cbe] = item;
  const locKey = item.site+'|'+item.bat+'|'+item.etage+'|'+item.bureau;
  if(!LOC_INDEX[locKey]) LOC_INDEX[locKey]=[];
  LOC_INDEX[locKey].push(item);
  // Mettre à jour HIER et FAMS pour que listes déroulantes incluent le nouveau
  if (!HIER[item.site]) HIER[item.site] = {};
  if (!HIER[item.site][item.bat]) HIER[item.site][item.bat] = {};
  if (!HIER[item.site][item.bat][item.etage]) HIER[item.site][item.bat][item.etage] = [];
  if (!HIER[item.site][item.bat][item.etage].includes(item.bureau)) {
    HIER[item.site][item.bat][item.etage].push(item.bureau);
    HIER[item.site][item.bat][item.etage].sort();
  }
  if (item.fam && item.art) {
    if (!FAMS[item.fam]) FAMS[item.fam] = [];
    if (!FAMS[item.fam].includes(item.art)) FAMS[item.fam].push(item.art);
  }
  invalidateStatsCache();
  saveLocal();
  saveDBCache(); // mettre le nouveau bien dans le cache tout de suite (évite sa disparition au rechargement)
  closeModal();
  renderMain();  // Affiche la table du bureau actuel qui inclut maintenant le nouvel article
  renderDataStatus();
  showToast('Article ajouté', 'success');
  logActivity('ADD_ITEM', `${artNom} (${famNom}) - ${curLoc.bureau}`, cbi);
  await writeNI(item);

  // ── Photos collectées pendant l'ajout : stockage local + téléchargement (galerie) ──
  const pendingPhotos = window._newItemPhotos || [];
  if (pendingPhotos.length) {
    try {
      if (!photos[cbi]) photos[cbi] = [];
      for (let i = 0; i < pendingPhotos.length; i++) {
        const p = pendingPhotos[i];
        const blob = p.blob;
        const photoIndex = i + 1;
        const name = await storePhotoLocal(cbi, blob, photoIndex);
        downloadPhotoToDevice(blob, cbi, photoIndex);
        const url = URL.createObjectURL(blob);
        photos[cbi].push({ name, local: true, viewUrl: url, thumbUrl: url, photoIndex, by: currentUser, ts: Date.now() });
        if (p.previewUrl) { try { URL.revokeObjectURL(p.previewUrl); } catch(e) {} }
      }
      savePhotos();
      // Enregistrer les noms de photos dans le champ photos de la base
      updatePhotoUrlsInDB(cbi);
      showToast(`✓ ${pendingPhotos.length} photo(s) enregistrée(s)`, 'success');
    } catch(err) {
      showToast('Erreur photos: ' + err.message, 'danger');
    }
  }
  window._newItemPhotos = [];
}
function showDoublonModal(type, existing) {
  const loc = [existing.site, existing.bat, existing.etage, existing.bureau].filter(Boolean).join(' › ');
  const msg = type === 'cbi' ? `Code barre IMMO <strong>${esc(existing.cbi)}</strong> déjà existant.` : `Code barre EMP <strong>${esc(existing.cbe)}</strong> déjà attribué.`;
  showModal(`<div class="modal-drag"></div><div class="modal-head"><h2 style="color:var(--danger-txt)"><i class="ti ti-alert-circle"></i> Doublon</h2><button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="alert alert-danger"><i class="ti ti-alert-circle"></i>${msg}</div><div class="item-box"><div style="font-size:15px;font-weight:700">${esc(existing.art)}</div><div style="font-size:13px;color:var(--text2)">${esc(existing.fam)}</div><div><span class="tag">CBI: ${esc(existing.cbi)}</span>${existing.cbe ? `<span class="tag">CBE: ${esc(existing.cbe)}</span>` : ''}</div><div style="margin-top:8px;padding:8px;background:var(--info-bg);border-radius:var(--radius);font-size:13px"><i class="ti ti-map-pin"></i> ${loc}</div>${updates[existing.cbi] ? `<div style="margin-top:6px;font-size:12px;color:var(--success-txt)"><i class="ti ti-check"></i> Déjà inventorié par ${updates[existing.cbi].by}</div>` : '<div style="margin-top:6px;font-size:12px;color:var(--warn-txt)"><i class="ti ti-clock"></i> Non encore inventorié</div>'}</div><div class="modal-actions"><button class="btn btn-primary" onclick="closeModal();openEditItem_cbi('${esc(existing.cbi)}')"><i class="ti ti-edit"></i> Mettre à jour</button><button class="btn" onclick="closeModal()">Fermer</button></div></div>`);
}

// ---------- PHOTOS ----------
function renderPhotoSection(cbi) {
  const list = photos[cbi] || [];
  // Miniatures locales AVEC le nom du fichier affiché dessous
  const thumbs = list.map((p, i) => `<div style="position:relative;display:inline-flex;flex-direction:column;align-items:center;margin:4px;width:90px"><div style="position:relative"><a href="${p.viewUrl}" target="_blank"><img src="${p.thumbUrl}" alt="photo" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:0.5px solid var(--border)"></a><button onclick="savePhotoToGallery('${cbi}',${i})" title="Enregistrer dans la galerie" style="position:absolute;bottom:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--info-bg);color:var(--info-txt);border:none;cursor:pointer;font-size:11px"><i class="ti ti-download" style="font-size:12px"></i></button><button onclick="deletePhoto('${cbi}',${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--danger-bg);color:var(--danger-txt);border:none;cursor:pointer;font-size:12px">✕</button></div><div style="font-size:8px;color:var(--text3);text-align:center;margin-top:3px;word-break:break-all;line-height:1.2" title="${esc(p.name||'')}">${esc(p.name || '')}</div></div>`).join('');

  // Photos PARTAGÉES (noms enregistrés par d'autres opérateurs) : lues depuis la base
  const item = findItemByCbi(cbi);
  const localNames = new Set(list.map(p => p.name));
  let sharedHtml = '';
  if (item && item._photoMeta) {
    const allMeta = item._photoMeta.split('\n').map(line => {
      const [name, by, ts] = line.split('|');
      return { name: name || '', by: by || '', ts: parseInt(ts) || 0 };
    }).filter(e => e.name);
    // Nettoyer en arrière-plan les entrées orphelines (sans auteur)
    if (allMeta.some(e => !e.by) && currentUser && navigator.onLine) cleanOrphanPhotoMeta(cbi);
    // Entrées d'autres opérateurs, pas déjà présentes en local
    const sharedEntries = allMeta.filter(e => e.by && !localNames.has(e.name));
    if (sharedEntries.length) {
      const chips = sharedEntries.map(e => {
        const byName = USER_NAMES[(e.by || '').toLowerCase()] || e.by.split('@')[0];
        const dateStr = e.ts ? new Date(e.ts).toLocaleDateString('fr-FR') : '';
        return `<div style="display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:90px;min-height:80px;margin:4px;border-radius:8px;border:1px dashed var(--border);background:var(--bg2);text-align:center;padding:6px 4px"><i class="ti ti-photo" style="font-size:18px;color:var(--text3)"></i><div style="font-size:8px;color:var(--text2);line-height:1.2;margin-top:3px;word-break:break-all" title="${esc(e.name)}">${esc(e.name)}</div><div style="font-size:8px;color:var(--text3);margin-top:2px">${esc(byName)}${dateStr ? ' · ' + dateStr : ''}</div></div>`;
      }).join('');
      sharedHtml = `<div style="margin-bottom:8px"><div style="font-size:11px;color:var(--text2);margin-bottom:4px"><i class="ti ti-users"></i> Photos prises par l'équipe</div><div style="display:flex;flex-wrap:wrap">${chips}</div></div>`;
    }
  }

}


// Télécharge un blob photo dans le dossier Téléchargements (d'où la galerie le récupère).
// Nom = code-barres IMMO + index (ex. 32012345_1.jpg).
function downloadPhotoToDevice(blob, cbi, photoIndex) {
  try {
    const safeCbi = String(cbi).replace(/[^\w-]/g, '');
    const fname = `${safeCbi}_${photoIndex}.jpg`;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Libérer l'URL après un court délai (laisser le temps au téléchargement de démarrer)
    setTimeout(() => { try { URL.revokeObjectURL(url); } catch(e) {} }, 4000);
    return fname;
  } catch(e) { console.error('downloadPhotoToDevice', e); return null; }
}

// Retire les entrées photo orphelines (sans auteur) de la métadonnée en base.
// Ces entrées venaient d'anciennes versions et s'affichaient comme "inconnu".
let _cleaningMeta = {};
async function cleanOrphanPhotoMeta(cbi) {
  if (!sb || !navigator.onLine || _cleaningMeta[cbi]) return;
  _cleaningMeta[cbi] = true;
  try {
    const { data } = await sb.from('inventaire').select('photos').eq('cbi', cbi).maybeSingle();
    if (data && data.photos) {
      const kept = data.photos.split('\n').map(l => {
        const [name, by, ts] = l.split('|');
        return { name: name||'', by: by||'', ts: ts||'' };
      }).filter(e => e.name && e.by); // garder seulement les entrées avec auteur
      const merged = kept.map(e => `${e.name}|${e.by}|${e.ts}`).join('\n');
      await sb.from('inventaire').update({ photos: merged }).eq('cbi', cbi);
      const item = findItemByCbi(cbi);
      if (item) item._photoMeta = merged;
      const sec = document.getElementById(`photo-section-${cbi}`);
      if (sec) sec.outerHTML = renderPhotoSection(cbi);
    }
  } catch(e) { console.warn('cleanOrphanPhotoMeta', e); }
  finally { delete _cleaningMeta[cbi]; }
}

// Écrit dans le champ "photos" de Supabase les NOMS des photos prises (sans upload du fichier).
// Format par ligne : "nomFichier|opérateur|timestamp". Fusionne avec les entrées des autres opérateurs.
async function updatePhotoUrlsInDB(cbi) {
  if (!sb || !navigator.onLine) return;
  try {
    const me = (currentUser || '').toLowerCase();
    // 1. Relire la métadonnée actuelle (pour préserver les entrées des autres opérateurs)
    let existing = [];
    try {
      const { data } = await sb.from('inventaire').select('photos').eq('cbi', cbi).maybeSingle();
      if (data && data.photos) {
        existing = data.photos.split('\n').map(l => {
          const [name, by, ts] = l.split('|');
          return { name: name||'', by: by||'', ts: ts||'' };
        }).filter(e => e.name);
      }
    } catch(e) {}
    // 2. Garder les entrées des AUTRES opérateurs identifiés
    const others = existing.filter(e => {
      const by = (e.by || '').toLowerCase();
      return by && by !== me;
    });
    // 3. Mes entrées actuelles (noms de fichiers)
    const mine = (photos[cbi] || []).map(p => ({
      name: p.name || '', by: currentUser || '', ts: p.ts || Date.now()
    }));
    // 4. Recomposer et écrire (nom|opérateur|timestamp)
    const merged = [...others, ...mine]
      .filter(e => e.name)
      .map(e => `${e.name}|${e.by}|${e.ts}`).join('\n');
    await sb.from('inventaire').update({ photos: merged }).eq('cbi', cbi);
    const item = findItemByCbi(cbi);
    if (item) item._photoMeta = merged;
  } catch(e) { console.warn('updatePhotoUrlsInDB', e); }
}

async function handlePhotoCapture(event, cbi) {
  const files = [...event.target.files];
  if (!files.length) return;
  showToast(`Enregistrement de ${files.length} photo(s)…`, 'info');
  try {
    if (!photos[cbi]) photos[cbi] = [];
    const startIdx = photos[cbi].length;
    for (let i = 0; i < files.length; i++) {
      const photoIndex = startIdx + i + 1;
      // Compresser
      const compressed = await compressImage(files[i], 1200, 0.82);
      // 1) Stocker dans l'app en local (IndexedDB), nommé par code-barres
      const name = await storePhotoLocal(cbi, compressed, photoIndex);
      // 2) Télécharger dans la tablette (→ galerie), nommé par code-barres
      downloadPhotoToDevice(compressed, cbi, photoIndex);
      // 3) Affichage immédiat
      const url = URL.createObjectURL(compressed);
      const entry = { name, local: true, viewUrl: url, thumbUrl: url, photoIndex, by: currentUser, ts: Date.now() };
      photos[cbi].push(entry);
    }
    savePhotos();
    // Enregistrer les NOMS des photos dans le champ photos de la base (pas le fichier)
    updatePhotoUrlsInDB(cbi);
    const sec = document.getElementById(`photo-section-${cbi}`);
    if (sec) sec.outerHTML = renderPhotoSection(cbi);
    showToast(`${files.length} photo(s) enregistrée(s) — vérifiez vos Téléchargements/Galerie`, 'success');
  } catch(err) {
    showToast('Erreur enregistrement photo: ' + err.message, 'danger');
    console.error('handlePhotoCapture', err);
  }
  event.target.value = '';
}
// Re-télécharger une photo déjà prise (bouton manuel sur la fiche)
async function savePhotoToGallery(cbi, idx) {
  const p = photos[cbi] && photos[cbi][idx];
  if (!p) return;
  try {
    // Récupérer le blob depuis IndexedDB (la source permanente)
    const locals = await getPhotosLocal(cbi);
    const match = locals.find(l => l.name === p.name) || locals[idx];
    if (match && match.blob) {
      downloadPhotoToDevice(match.blob, cbi, p.photoIndex || idx + 1);
      showToast('Photo enregistrée — vérifiez vos Téléchargements/Galerie', 'success');
    } else {
      showToast('Photo introuvable en local', 'warn');
    }
  } catch(e) { showToast('Erreur: ' + e.message, 'danger'); }
}
async function deletePhoto(cbi, idx) {
  if (!confirm('Supprimer cette photo ?')) return;
  const p = photos[cbi] && photos[cbi][idx];
  if (p && p.name) { try { await deletePhotoLocal(p.name); } catch(e) {} }
  if (p && p.viewUrl && p.local) { try { URL.revokeObjectURL(p.viewUrl); } catch(e) {} }
  photos[cbi].splice(idx, 1);
  if (!photos[cbi].length) delete photos[cbi];
  savePhotos();
  // Mettre à jour les noms de photos en base (fusion qui préserve les autres opérateurs)
  await updatePhotoUrlsInDB(cbi);
  const sec = document.getElementById(`photo-section-${cbi}`);
  if (sec) sec.outerHTML = renderPhotoSection(cbi);
  showToast('Photo supprimée', 'success');
}


function compressImage(file, maxW, quality) { return new Promise((res, rej) => { const img = new Image(); const url = URL.createObjectURL(file); img.onload = () => { URL.revokeObjectURL(url); const canvas = document.createElement('canvas'); let w = img.width, h = img.height; if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; } canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h); canvas.toBlob(b => res(b), 'image/jpeg', quality); }; img.onerror = rej; img.src = url; }); }

function expAll() { if (!DB.length) return; const rows = [...DB, ...newItems.filter(r => !r._newLoc)].map(r => { const u = updates[r.cbi] || {}; const pLinks = (photos[r.cbi] || []).map(p => p.viewUrl).join(' | '); const obsInitiale = (r.obs || '').trim(); const obsMaj = u.obs !== undefined ? u.obs : ''; const criteres = extractCriteresFromObs(obsMaj || obsInitiale).join(' ; '); const obsMajClean = obsMaj.split('\n').filter(l => !l.startsWith('État observé:')).join(' ').trim(); let statut = 'EN ATTENTE'; if (r._new) statut = 'NOUVEAU'; else if (u.obs && /TRANSFÉRÉ de /.test(u.obs)) statut = 'TRANSFÉRÉ'; else if (updates[r.cbi]) statut = 'INVENTORIÉ'; const ts = u.ts || r._addedAt || 0; const byEmail = u.by || r._addedBy || r.nom_inv || ''; const byName = resolveInventoristeName(byEmail); return { 'SITE': r.site, 'BATIMENT': r.bat, 'ETAGE': r.etage, 'BUREAU': r.bureau, 'CBE': r.cbe, 'CBI': r.cbi, 'FAMILLE': r.fam, 'ARTICLE': r.art, 'QTE': r.qty, 'ETAT SERVICE': u.serv || r.serv, 'RENOUVELABILITE': u.renouv || r.renouv, 'CRITERES ETAT': criteres, 'OBSERVATION INITIALE': obsInitiale, 'OBSERVATION MISE A JOUR': obsMajClean, 'ARTICLE TROUVE': u.trouve || '', 'N° SERIE': r.serie, 'MODELE': r.modele, 'MARQUE': r.marque, 'N° AMENDIS': r.prod || '', 'DIRECTION': r.dir, 'INVENTORISTE': byName, 'DATE': ts ? new Date(ts).toLocaleDateString('fr-FR') : '', 'STATUT': statut, 'PHOTOS': pLinks }; }); dlX(rows, 'etat_global_inventaire'); closeModal(); showToast('État global téléchargé', 'success'); logActivity('EXPORT', `État global (${rows.length} lignes)`); }

// Télécharge un classeur Excel multi-feuilles
function dlXMulti(sheets, filename) {
  const wb = XLSX.utils.book_new();
  for (const [sheetName, rows] of Object.entries(sheets)) {
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{ '(vide)': '' }]);
    XLSX.utils.book_append_sheet(wb, ws, sheetName.slice(0, 31)); // Excel limite à 31 car.
  }
  XLSX.writeFile(wb, filename + '_' + new Date().toISOString().split('T')[0] + '.xlsx');
}

// Statut d'un bureau calculé d'après son % d'inventaire
function getBureauStatut(site, bat, etage, bureau) {
  const stats = getStatsFor(site, bat, etage, bureau);
  if (!stats.total) return 'VIDE';
  if (stats.pct === 100) return 'TERMINE';
  if (stats.pct > 0) return 'EN COURS';
  return 'NON OUVERT';
}
function getBureauLastInfo(site, bat, etage, bureau) {
  const items = LOC_INDEX[site + '|' + bat + '|' + etage + '|' + bureau] || [];
  let lastTs = 0, lastBy = '';
  for (const r of items) {
    const u = updates[r.cbi];
    if (u && u.ts > lastTs) { lastTs = u.ts; lastBy = u.by || ''; }
  }
  return { lastTs, lastBy };
}

// Construction de la liste de TOUS les bureaux avec leurs stats
function buildAllBureauData() {
  const data = [];
  for (const site of Object.keys(HIER).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }))) {
    for (const bat of Object.keys(HIER[site]).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }))) {
      for (const etage of Object.keys(HIER[site][bat]).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }))) {
        for (const bureau of HIER[site][bat][etage]) {
          const stats = getStatsFor(site, bat, etage, bureau);
          const statut = getBureauStatut(site, bat, etage, bureau);
          const info = getBureauLastInfo(site, bat, etage, bureau);
          data.push({ site, bat, etage, bureau, stats, statut, lastTs: info.lastTs, lastBy: info.lastBy });
        }
      }
    }
  }
  return data;
}

function renderSuiviList() {
  // Construire la liste filtrée
  let data = buildAllBureauData();
  // Filtre par site
  if (UF.suiviSiteFilter !== 'all') data = data.filter(b => b.site === UF.suiviSiteFilter);

  // Compteurs par statut (VIDE = bureau sans articles)
  const counts = {
    all: data.length,
    en_cours: data.filter(b => b.statut === 'EN COURS').length,
    non_ouvert: data.filter(b => b.statut === 'NON OUVERT' || b.statut === 'VIDE').length,
    termine: data.filter(b => b.statut === 'TERMINE').length
  };

  // Filtre par statut
  let filtered = data;
  if (UF.suiviFilter === 'en_cours') filtered = data.filter(b => b.statut === 'EN COURS');
  else if (UF.suiviFilter === 'non_ouvert') filtered = data.filter(b => b.statut === 'NON OUVERT' || b.statut === 'VIDE');
  else if (UF.suiviFilter === 'termine') filtered = data.filter(b => b.statut === 'TERMINE');

  // Filtre par recherche
  if (UF.suiviSearch && UF.suiviSearch.length >= 2) {
    const q = UF.suiviSearch.toLowerCase();
    filtered = filtered.filter(b =>
      (b.bureau + ' ' + b.etage + ' ' + b.bat + ' ' + b.site).toLowerCase().includes(q)
    );
  }

  // Tri : EN COURS par date desc, puis par % asc (les moins avancés d'abord)
  filtered.sort((a, b) => {
    if (a.statut === 'EN COURS' && b.statut === 'EN COURS') return b.lastTs - a.lastTs;
    return a.stats.pct - b.stats.pct;
  });

  // Mettre à jour les boutons filtre avec compteurs
  const filterBtns = document.getElementById('suivi-filter-btns');
  if (filterBtns) {
    const btn = (key, label, color, icon) => {
      const active = UF.suiviFilter === key;
      const cnt = counts[key];
      const bg = active ? `background:${color};color:#fff;border-color:${color}` : '';
      return `<button class="btn btn-sm" style="min-height:34px;font-size:12px;flex:1;min-width:130px;${bg}" onclick="setSuiviFilter('${key}')"><i class="ti ${icon}"></i> ${label} <span style="opacity:.8">(${cnt})</span></button>`;
    };
    filterBtns.innerHTML = [
      btn('en_cours', 'En cours', 'var(--warn-txt)', 'ti-clock'),
      btn('non_ouvert', 'Non inventoriés', '#6b7280', 'ti-circle-dashed'),
      btn('termine', 'Terminés', 'var(--success-txt)', 'ti-circle-check'),
      btn('all', 'Tous', 'var(--accent)', 'ti-layout-grid'),
    ].join('');
  }

  // Rendu de la liste
  const container = document.getElementById('suivi-list-container');
  if (!container) return;

  if (!filtered.length) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">
      <i class="ti ti-filter-off" style="font-size:48px;opacity:.3;display:block;margin-bottom:10px"></i>
      Aucun bureau ne correspond à ce filtre
    </div>`;
    return;
  }

  // Header avec compteur
  const statutLabel = { en_cours: 'en cours', non_ouvert: 'non inventoriés', termine: 'terminés', all: 'au total' }[UF.suiviFilter];
  const headerHTML = `<div style="font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:600">
    ${filtered.length} bureau${filtered.length > 1 ? 'x' : ''} ${statutLabel}${UF.suiviSiteFilter !== 'all' ? ' à ' + UF.suiviSiteFilter : ''}
  </div>`;

  container.innerHTML = headerHTML + filtered.map(b => bureauCard(b)).join('');
}

async function saveEditLocation(btn) {
  const level = btn.dataset.level;
  const oldSite = btn.dataset.site, oldBat = btn.dataset.bat, oldEtage = btn.dataset.etage, oldBureau = btn.dataset.bureau;
  const newName = document.getElementById('el-name').value.trim();
  if (!newName) { showToast('Le nom est requis', 'warn'); return; }

  // ── CONFIRMATION FORTE pour modifications site/bat/etage (impact en cascade) ──
  if (level !== 'bureau') {
    const oldName = level === 'site' ? oldSite : level === 'bat' ? oldBat : oldEtage;
    if (newName !== oldName) {
      const items = getItemsAt(oldSite, level === 'site' ? null : oldBat, (level === 'site' || level === 'bat') ? null : oldEtage, null);
      const count = items.length;
      const labelMap = { site: 'site', bat: 'bâtiment', etage: 'étage' };
      const lbl = labelMap[level];
      // Demander confirmation forte : taper le nom actuel
      const userInput = prompt(
        `⚠ ATTENTION - Modification critique\n\n` +
        `Vous allez renommer le ${lbl} :\n` +
        `   "${oldName}" → "${newName}"\n\n` +
        `Cette modification impactera ${count.toLocaleString('fr-FR')} article(s) ` +
        `et tous les sous-emplacements rattachés.\n\n` +
        `Pour confirmer, tapez exactement le nom actuel :\n"${oldName}"`
      );
      if (userInput !== oldName) {
        if (userInput !== null) showToast('Confirmation invalide — modification annulée', 'warn');
        return;
      }
    }
  }

  let newSite = oldSite, newBat = oldBat, newEtage = oldEtage, newBureau = oldBureau;
  let targetBatId = null;

  if (level === 'site') newSite = newName;
  else if (level === 'bat') newBat = newName;
  else if (level === 'etage') {
    newEtage = newName;
    const batSel = document.getElementById('el-bat');
    if (batSel && batSel.value) newBat = batSel.value;
  } else {
    newBureau = newName;
    const etageSel = document.getElementById('el-etage');
    const batSel = document.getElementById('el-bat');
    if (etageSel && etageSel.value) newEtage = etageSel.value;
    if (batSel && batSel.value) newBat = batSel.value;
  }

  // Détecter si bat de destination a changé
  if (newBat !== oldBat) {
    for (const bid in REL_BATS) {
      const b = REL_BATS[bid];
      const sCode = (REL_SITES[b.site_id] || {}).site_code;
      if (sCode === oldSite && b.bat_nom === newBat) { targetBatId = bid; break; }
    }
  }

  // ───── Mettre à jour directement la table relationnelle correspondante ─────
  let sheetRow = null, sheetRange = '', updateData = [], count = 0;

  try {
    if (level === 'site') {
      // Modifier le code site dans la table sites
      const site_id = findSiteIdByCode(oldSite);
      if (site_id && currentUser && navigator.onLine && sb) {
        const { error } = await sb.from('sites').update({ site_code: newName }).eq('site_id', site_id);
        if (error) throw error;
        REL_SITES[site_id].site_code = newName;
        // Dénormalisation : mettre à jour la colonne site des biens concernés
        await sb.from('inventaire').update({ site: newName }).eq('site', oldSite);
      } else if (site_id) {
        REL_SITES[site_id].site_code = newName;
      }
      // Mettre à jour la dénormalisation locale
      for (const r of DB) if (r.site === oldSite) { r.site = newName; count++; }
      for (const r of newItems) if (r.site === oldSite) { r.site = newName; count++; }
      if (siteStatuts[oldSite]) { siteStatuts[newName] = siteStatuts[oldSite]; delete siteStatuts[oldSite]; }
    }
    else if (level === 'bat') {
      // Modifier le nom du bâtiment dans la table batiments
      let bat_id = null;
      for (const bid in REL_BATS) {
        const b = REL_BATS[bid];
        const sCode = (REL_SITES[b.site_id] || {}).site_code;
        if (sCode === oldSite && b.bat_nom === oldBat) { bat_id = bid; break; }
      }
      if (bat_id && currentUser && navigator.onLine && sb) {
        const { error } = await sb.from('batiments').update({ bat_nom: newName }).eq('bat_id', bat_id);
        if (error) throw error;
        REL_BATS[bat_id].bat_nom = newName;
        // Dénormalisation : biens de ce site + bâtiment
        await sb.from('inventaire').update({ batiment: newName }).eq('site', oldSite).eq('batiment', oldBat);
      } else if (bat_id) {
        REL_BATS[bat_id].bat_nom = newName;
      }
      for (const r of DB) if (r.site === oldSite && r.bat === oldBat) { r.bat = newName; count++; }
      for (const r of newItems) if (r.site === oldSite && r.bat === oldBat) { r.bat = newName; count++; }
    }
    else if (level === 'etage') {
      // Mettre à jour TOUTES les lignes Emplacements du même bâtiment + étage
      const empsToUpdate = [];
      for (const eid in REL_EMPS) {
        const e = REL_EMPS[eid];
        const sCode = (REL_SITES[e.site_id] || {}).site_code;
        const bNom = (REL_BATS[e.bat_id] || {}).bat_nom;
        if (sCode === oldSite && bNom === oldBat && e.etage === oldEtage) {
          empsToUpdate.push(eid);
        }
      }
      if (currentUser && navigator.onLine && sb && empsToUpdate.length) {
        for (const eid of empsToUpdate) {
          const newBatId = targetBatId || REL_EMPS[eid].bat_id;
          REL_EMPS[eid].etage = newEtage;
          REL_EMPS[eid].bat_id = newBatId;
          const { error } = await sb.from('emplacements').update({ etage: newEtage, bat_id: newBatId }).eq('emp_id', eid);
          if (error) throw error;
        }
        // Dénormalisation dans inventaire
        const patch = { etage: newEtage };
        if (newBat !== oldBat) patch.batiment = newBat;
        await sb.from('inventaire').update(patch).eq('site', oldSite).eq('batiment', oldBat).eq('etage', oldEtage);
      } else {
        for (const eid of empsToUpdate) { REL_EMPS[eid].etage = newEtage; if (targetBatId) REL_EMPS[eid].bat_id = targetBatId; }
      }
      // Dénormalisation
      for (const r of getAllItems()) {
        if (r.site === oldSite && r.bat === oldBat && r.etage === oldEtage) {
          r.etage = newEtage;
          if (newBat !== oldBat) r.bat = newBat;
          count++;
        }
      }
    }
    else { // bureau
      // Modifier 1 seule ligne dans Emplacements
      let emp_id = null;
      for (const eid in REL_EMPS) {
        const e = REL_EMPS[eid];
        const sCode = (REL_SITES[e.site_id] || {}).site_code;
        const bNom = (REL_BATS[e.bat_id] || {}).bat_nom;
        if (sCode === oldSite && bNom === oldBat && e.etage === oldEtage && e.bureau === oldBureau) { emp_id = eid; break; }
      }
      // Vérifier l'unicité du CBE avant toute écriture
      const cbeCheckEl = document.getElementById('el-cbe');
      if (cbeCheckEl) {
        const cbeToCheck = cbeCheckEl.value.trim();
        if (cbeToCheck) {
          const conflict = findCbeConflict(cbeToCheck, emp_id);
          if (conflict) {
            showToast(`Code barre "${cbeToCheck}" déjà utilisé par : ${conflict.site} › ${conflict.bat} › ${conflict.etage} › ${conflict.bureau}`, 'danger');
            return;
          }
        }
      }
      if (emp_id && currentUser && navigator.onLine && sb) {
        const newBatId = targetBatId || REL_EMPS[emp_id].bat_id;
        const cbeEl = document.getElementById('el-cbe');
        const newCbeVal = cbeEl ? cbeEl.value.trim() : REL_EMPS[emp_id].cbe;
        const { error } = await sb.from('emplacements').update({
          cbe: newCbeVal, bat_id: newBatId, etage: newEtage, bureau: newBureau
        }).eq('emp_id', emp_id);
        if (error) throw error;
        REL_EMPS[emp_id].cbe = newCbeVal;
        REL_EMPS[emp_id].bat_id = newBatId;
        REL_EMPS[emp_id].etage = newEtage;
        REL_EMPS[emp_id].bureau = newBureau;
        invalidateCbeIndex();
        // Dénormalisation dans inventaire (biens de ce bureau)
        const patch = { bureau: newBureau, etage: newEtage, cbe: newCbeVal };
        if (newBat !== oldBat) patch.batiment = newBat;
        await sb.from('inventaire').update(patch).eq('emp_id', emp_id);
      } else if (emp_id) {
        const cbeEl = document.getElementById('el-cbe');
        REL_EMPS[emp_id].cbe = cbeEl ? cbeEl.value.trim() : REL_EMPS[emp_id].cbe;
        REL_EMPS[emp_id].bat_id = targetBatId || REL_EMPS[emp_id].bat_id;
        REL_EMPS[emp_id].etage = newEtage;
        REL_EMPS[emp_id].bureau = newBureau;
        invalidateCbeIndex();
      }
      // Dénormalisation
      for (const r of getAllItems()) {
        if (r.site === oldSite && r.bat === oldBat && r.etage === oldEtage && r.bureau === oldBureau) {
          r.bureau = newBureau; r.etage = newEtage; r.bat = newBat;
          count++;
        }
      }
    }
  } catch(e) {
    showToast('Erreur modification: ' + e.message, 'danger');
    console.error(e);
    return;
  }

  saveLocal();
  closeModal();
  buildHier();
  invalidateStatsCache();

  // Si on était dans l'inventaire de ce bureau, mettre à jour curLoc
  if (curLoc.site === oldSite && (level === 'site' || curLoc.bat === oldBat) && (level === 'site' || level === 'bat' || curLoc.etage === oldEtage) && (level !== 'bureau' || curLoc.bureau === oldBureau)) {
    if (level === 'site') navigateTo(newSite, curLoc.bat, curLoc.etage, curLoc.bureau);
    else if (level === 'bat') navigateTo(curLoc.site, newBat, curLoc.etage, curLoc.bureau);
    else if (level === 'etage') navigateTo(curLoc.site, newBat, newEtage, curLoc.bureau);
    else navigateTo(newSite, newBat, newEtage, newBureau);
  }

  if (currentView === 'locations') renderLocationsView();
  else renderMain();
  renderDataStatus();
  const labelMap = { site: 'Site', bat: 'Bâtiment', etage: 'Étage', bureau: 'Bureau' };
  showToast(`${labelMap[level]} modifié — ${count} article(s) impacté(s)`, 'success');
  logActivity('EDIT_LOCATION', `${labelMap[level]}: renommage (${count} articles)`, `${level}`);
}

function confirmDeleteLocation(btn) {
  if (!can('canDelete')) { showToast('Accès refusé — administrateur uniquement', 'danger'); return; }
  const level = btn.dataset.level;
  const site = btn.dataset.site, bat = btn.dataset.bat, etage = btn.dataset.etage, bureau = btn.dataset.bureau;
  const labelMap = { site: 'site', bat: 'bâtiment', etage: 'étage', bureau: 'bureau' };
  const lbl = labelMap[level];
  const name = level === 'site' ? site : level === 'bat' ? bat : level === 'etage' ? etage : bureau;
  const items = getItemsAt(site, level === 'site' ? null : bat, (level === 'site' || level === 'bat') ? null : etage, level === 'bureau' ? bureau : null);
  const count = items.length;

  // Bloquer la suppression si des articles existent (sécurité)
  if (count > 0) {
    showToast(`Impossible de supprimer : ${count} article(s) rattaché(s). Transférez ou supprimez d'abord les articles.`, 'danger');
    return;
  }

  // Confirmation forte : taper le nom exact
  const userInput = prompt(
    `⚠ SUPPRESSION DÉFINITIVE\n\n` +
    `Vous allez supprimer le ${lbl} :\n` +
    `   "${name}"\n\n` +
    `${level !== 'bureau' ? `Tous les sous-emplacements vides rattachés seront aussi supprimés.\n\n` : ''}` +
    `Cette action est irréversible.\n\n` +
    `Pour confirmer, tapez exactement le nom :\n"${name}"`
  );
  if (userInput !== name) {
    if (userInput !== null) showToast('Confirmation invalide — suppression annulée', 'warn');
    return;
  }
  doDeleteLocation(level, site, bat, etage, bureau);
}

async function doDeleteLocation(level, site, bat, etage, bureau) {
  const labelMap = { site: 'Site', bat: 'Bâtiment', etage: 'Étage', bureau: 'Bureau' };
  const name = level === 'site' ? site : level === 'bat' ? bat : level === 'etage' ? etage : bureau;
  try {
    // Identifier les emplacements (REL_EMPS) à supprimer
    const empIdsToDelete = [];
    for (const eid in REL_EMPS) {
      const e = REL_EMPS[eid];
      const sCode = (REL_SITES[e.site_id] || {}).site_code;
      const bNom = (REL_BATS[e.bat_id] || {}).bat_nom;
      let match = false;
      if (level === 'site') match = (sCode === site);
      else if (level === 'bat') match = (sCode === site && bNom === bat);
      else if (level === 'etage') match = (sCode === site && bNom === bat && e.etage === etage);
      else if (level === 'bureau') match = (sCode === site && bNom === bat && e.etage === etage && e.bureau === bureau);
      if (match) empIdsToDelete.push(eid);
    }

    // Supprimer les emplacements dans Supabase
    if (currentUser && navigator.onLine && sb && empIdsToDelete.length) {
      const { error } = await sb.from('emplacements').delete().in('emp_id', empIdsToDelete);
      if (error) throw error;
    }

    // Supprimer du cache local REL_EMPS
    for (const eid of empIdsToDelete) delete REL_EMPS[eid];

    buildHier();
    invalidateAllItemsCache();
    invalidateCbeIndex();
    invalidateStatsCache();
    saveLocal();
    saveDBCache();
    closeModal();
    refreshCurrentView();
    renderDataStatus();
    showToast(`${labelMap[level]} "${name}" supprimé`, 'success');
    logActivity('DELETE_LOCATION', `${labelMap[level]}: ${name} (${empIdsToDelete.length} emplacement(s))`, level);
  } catch(e) {
    showToast('Erreur suppression: ' + e.message, 'danger');
    console.error(e);
  }
}

async function saveLoc() {
  const site = document.getElementById('al-site').value === '__n' ? document.getElementById('al-site-n').value.trim() : document.getElementById('al-site').value;
  const bat = document.getElementById('al-bat').value === '__n' ? document.getElementById('al-bat-n').value.trim() : document.getElementById('al-bat').value;

  const bureau = document.getElementById('al-bureau').value === '__n' ? document.getElementById('al-bureau-n').value.trim() : document.getElementById('al-bureau').value;
  const cbe = document.getElementById('al-cbe').value.trim();
  const type = document.getElementById('al-type').value.trim();
  if (!site || !bat || !etage || !bureau) { showToast('Tous les champs sont requis', 'warn'); return; }

  // Vérifier l'unicité du CBE (code barre emplacement)
  if (cbe) {
    const conflict = findCbeConflict(cbe, null);
    if (conflict) {
      showToast(`Code barre "${cbe}" déjà utilisé par : ${conflict.site} › ${conflict.bat} › ${conflict.etage} › ${conflict.bureau}`, 'danger');
      return;
    }
  }

  // Les emplacements/bâtiments doivent être créés EN LIGNE (pas de file d'attente pour les

  try {
    // 1. Créer le site s'il n'existe pas
    let site_id = findSiteIdByCode(site);
    if (!site_id) {
      site_id = genSiteId();
      REL_SITES[site_id] = { site_id, site_code: site, commune: '' };
      if (gTok) await sAppend('Sites', [[site_id, site, '']]);

      emp_id = genEmpId();

    } else {
      showToast('Cet emplacement existe déjà', 'warn');
      return;
    }

    // Reconstruire complètement la hiérarchie pour inclure le nouveau site/bât/étage/bureau
    buildHier();
    invalidateStatsCache();
    invalidateAllItemsCache();

    saveLocal();
    closeModal();
    showToast(`Emplacement ${bureau} créé`, 'success');
    logActivity('ADD_LOCATION', `${site} › ${bat} › ${etage} › ${bureau}`, emp_id);
    // Rafraîchir la vue actuelle (Avancement, Suivi, Emplacements, Inventaire)
    refreshCurrentView();
  } catch(e) {
    showToast('Erreur création: ' + e.message, 'danger');
    console.error(e);
  }
}

// ---------- INIT ----------
function showAppShell() {
  const lp = document.getElementById('login-page');
  if (lp) lp.style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('nav-bar').style.display = 'flex';
  document.getElementById('sidebar').style.display = 'none';
  // Afficher immédiatement le voyant de connexion (en ligne / hors-ligne)
  renderPendingIndicator();
  // Activer la gestion du bouton retour (évite la déconnexion au retour Android)
  initBackButton();
}
// Verrouille l'affichage en paysage. L'API screen.orientation.lock() n'est
// autorisée qu'en plein écran / PWA installée sur la plupart des navigateurs mobiles ;
// on l'enrobe donc dans un try/catch et on ignore silencieusement les refus.
function lockPortraitOrientation() {
  try {
    if (screen.orientation && typeof screen.orientation.lock === 'function') {
      const p = screen.orientation.lock('landscape');
      // lock() renvoie une promesse ; on absorbe le rejet (navigateur non plein écran, etc.)
      if (p && typeof p.catch === 'function') p.catch(() => {});
    }
  } catch(e) { /* API indisponible ou refusée : pas bloquant */ }
}
// Re-tenter le verrouillage quand l'app revient au premier plan (après veille,
// changement d'application, etc. sur la tablette).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') lockPortraitOrientation();
});
function init() {
  loadLocal();
  loadPhotos();
  // Verrouiller l'orientation en paysage (indépendamment du réglage système de la tablette).
  // Ne fonctionne pleinement qu'en mode PWA installée / plein écran sur la plupart des navigateurs.
  lockPortraitOrientation();
  // Afficher immédiatement le voyant de connexion (en ligne / hors-ligne / en attente)
  renderPendingIndicator();
  setTimeout(renderPendingIndicator, 100);

  // ── Écouter les changements de connectivité réseau ──
  window.addEventListener('online', () => {
    renderPendingIndicator();
    if (gTok && (pendingWrites.length)) {
      showToast('Connexion rétablie — synchronisation…', 'info');
      pushPending().then(async () => {
        await flushQueuedPhotos();
        if (typeof syncNow === 'function') syncNow();
      });
    } else if (gTok) {
      showToast('Connexion rétablie', 'success');
      // Vérifier aussi les photos en attente
      flushQueuedPhotos().then(n => {
        if (n > 0) { showToast(`${n} photo(s) synchronisée(s)`, 'success'); if (typeof syncNow === 'function') syncNow(); }
      });
    }
  });
  window.addEventListener('offline', () => {
    renderPendingIndicator();
    showToast('Mode hors-ligne — les modifications seront synchronisées au retour', 'warn');
  });
  // ── Démarrage Supabase : restaurer la session si elle existe ──
  (async () => {
    const restored = await restoreSupabaseSession();
    if (restored && currentUser) {
      await onAuthSuccess();
      logActivity('LOGIN', `Connexion (${currentUser})`, '');
      if (navigator.onLine) {
        flushQueuedPhotos().then(n => { if (n > 0) showToast(`${n} photo(s) hors-ligne synchronisée(s)`, 'success'); });
      }
    } else {
      // Pas de session → afficher la page de connexion
      document.getElementById('login-page').style.display = 'flex';
    }
  })();
}
init();
</script>
