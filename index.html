    const selBureau = document.getElementById('sel-bureau'); if (selBureau) selBureau.value = '';
    renderMain();
    history.pushState({ app: true, level: 2 }, '');
    return;
  }
  // 4. Si on n'est pas sur l'accueil → revenir à l'accueil
  if (currentView !== 'home') {
    goView('home');
    history.pushState({ app: true, level: 2 }, '');
    return;
  }
  // 5. Sur l'accueil : demander confirmation avant de quitter (re-empiler entre-temps)
  history.pushState({ app: true, level: 1 }, '');
  if (confirm('Quitter l\'application ?')) {

  }
}

// ─── Statistiques personnelles de l'utilisateur ───
function computeUserStats(user) {
  if (!user) return { total: 0 };
  // Articles inventoriés par cet utilisateur
  const myUpd = [];
  for (const cbi in updates) {
    if (updates[cbi].by === user) myUpd.push({ cbi, ts: updates[cbi].ts });
  }
  const total = myUpd.length;
  if (total === 0) return { total: 0 };

  // Aujourd'hui (date locale)
  const now = new Date();
  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const startOfWeek = startOfDay - (now.getDay() === 0 ? 6 : now.getDay() - 1) * 86400000;
  const today = myUpd.filter(u => u.ts >= startOfDay).length;
  const thisWeek = myUpd.filter(u => u.ts >= startOfWeek).length;

  // Vitesse : articles dans la dernière heure
  const oneHourAgo = Date.now() - 3600 * 1000;
  const lastHour = myUpd.filter(u => u.ts >= oneHourAgo).length;

  // Bureaux terminés cette semaine par moi
  const bureauxFinis = new Set();
  for (const key in LOC_INDEX) {
    const items = LOC_INDEX[key];
    if (!items.length) continue;
    const allDone = items.every(r => updates[r.cbi]);
    if (!allDone) continue;
    // Au moins un article inventorié par moi dans la semaine
    const myInWeek = items.some(r => {
      const u = updates[r.cbi];
      return u && u.by === user && u.ts >= startOfWeek;
    });
    if (myInWeek) bureauxFinis.add(key);
  }

  // Classement parmi les utilisateurs
  const byUser = {};
  for (const cbi in updates) {
    const by = updates[cbi].by || '?';
    byUser[by] = (byUser[by] || 0) + 1;
  }
  const sortedUsers = Object.entries(byUser).sort((a, b) => b[1] - a[1]);
  const myRank = sortedUsers.findIndex(([n]) => n === user) + 1;
  const totalUsers = sortedUsers.length;

  return { total, today, thisWeek, lastHour, bureauxFinis: bureauxFinis.size, myRank, totalUsers, sortedUsers };
}

      main.innerHTML = `<div class="empty"><i class="ti ti-building-warehouse"></i>
        <div style="font-size:18px;font-weight:700;margin-bottom:10px">Chargement des données…</div>
        <div style="font-size:14px;color:var(--text2)">Connexion à la base de données en cours</div>
      </div>`;
      return;
    }
    renderInventoryHome();
    return;
  }
  // ── Bureau sélectionné : créer la page d'inventaire et afficher la liste ──
  const items = getItems();
  const inv = items.filter(r => updates[r.cbi]).length;
  const pct = items.length ? Math.round(inv / items.length * 100) : 0;
  const barColor = pct === 100 ? 'var(--success-txt)' : pct > 50 ? 'var(--warn-txt)' : 'var(--accent)';

  const curCbe = getCbeFromLoc(curLoc.site, curLoc.bat, curLoc.etage, curLoc.bureau);
  const closed = isBureauClosed(curLoc.site, curLoc.bat, curLoc.etage, curLoc.bureau);
  const closeInfo = bureauStatuts[bureauKey(curLoc.site, curLoc.bat, curLoc.etage, curLoc.bureau)] || {};
  const closeByName = closeInfo.by ? (USER_NAMES[(closeInfo.by || '').toLowerCase()] || closeInfo.by) : '';
  const closeDate = closeInfo.ts ? new Date(closeInfo.ts).toLocaleDateString('fr-FR') : '';

  main.innerHTML = `

          <div style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Emplacement actuel</div>
          <div style="font-size:16px;font-weight:700;letter-spacing:-.01em">${esc(curLoc.bureau)}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${esc(curLoc.site)} › ${esc(curLoc.bat)} › ${esc(curLoc.etage)}</div>
          ${curCbe ? `<div style="margin-top:6px;display:inline-flex;align-items:center;gap:4px;font-family:monospace;font-size:11px;font-weight:600;background:var(--accent-bg);color:var(--accent);padding:3px 8px;border-radius:8px"><i class="ti ti-barcode" style="font-size:12px"></i>${esc(curCbe)}</div>` : ''}
        </div>
        ${can('canEditLocation') && !closed ? `<button class="btn btn-sm" onclick="openEditLocation('${esc(curLoc.site)}','${esc(curLoc.bat)}','${esc(curLoc.etage)}','${esc(curLoc.bureau)}')" title="Modifier cet emplacement" style="min-height:36px;padding:0 10px"><i class="ti ti-edit" style="font-size:16px"></i></button>` : ''}
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:800;color:${barColor};letter-spacing:-.02em">${pct}<span style="font-size:14px;font-weight:600">%</span></div>
          <div class="txt-xs">${inv}/${items.length}</div>
        </div>
      </div>
      <div class="pbar" style="height:8px;border-radius:4px"><div class="pbar-fill" style="width:${pct}%;border-radius:4px;background:${barColor}"></div></div>
    </div>

    ${closed ? `
    <!-- Bandeau : inventaire clôturé -->
    <div style="background:var(--success-bg);border:1px solid var(--success-ring);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px">
      <i class="ti ti-lock-check" style="font-size:24px;color:var(--success-txt)"></i>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;color:var(--success-txt)">Inventaire clôturé</div>
        <div style="font-size:12px;color:var(--text2)">${closeByName ? `Par ${esc(closeByName)}` : ''}${closeDate ? ` le ${closeDate}` : ''} — modifications verrouillées</div>
      </div>
      <button class="btn btn-sm btn-soft-accent" onclick="reopenBureauInventory()"><i class="ti ti-lock-open"></i> Rouvrir</button>
    </div>
    ` : ''}

    ${!closed ? `
    <!-- Zone de scan avec indicateurs 3 cas -->
    <label class="scan-zone" for="scan-inp">
      <i class="ti ti-scan"></i>
      <input type="text" id="scan-inp" placeholder="Scanner un code barre puis Entrée…" onkeydown="onScanKey(event)" autocomplete="off" inputmode="text">
      <span class="scan-hint">↵</span>
    </label>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;font-size:11px">
      <span style="display:inline-flex;align-items:center;gap:4px;color:var(--success-txt);background:var(--success-bg);padding:3px 8px;border-radius:8px"><i class="ti ti-edit" style="font-size:11px"></i> Article ici → Mise à jour</span>
      <span style="display:inline-flex;align-items:center;gap:4px;color:var(--warn-txt);background:var(--warn-bg);padding:3px 8px;border-radius:8px"><i class="ti ti-transfer" style="font-size:11px"></i> Article ailleurs → Transfert</span>
      <span style="display:inline-flex;align-items:center;gap:4px;color:var(--text2);background:var(--bg2);padding:3px 8px;border-radius:8px"><i class="ti ti-alert-circle" style="font-size:11px"></i> Inconnu → Bouton "Ajouter"</span>
    </div>
    ` : ''}

    <!-- Recherche et filtre -->
    <div class="search-row">
      <input type="text" id="srch" placeholder="Rechercher article…" oninput="debounceRenderTable()">
      <select id="filt" onchange="renderTable()">
        <option value="">Tous</option>
        <option value="__ni">Non inventoriés</option>
        <option value="EN SERVICE">En service</option>
        <option value="HORS SERVICE">Hors service</option>
        <option value="A METTRE AU REBUT">À rebut</option>
      </select>
      ${!closed ? `<button class="btn btn-primary btn-sm" onclick="openAddItem()" title="Ajouter un article manuellement"><i class="ti ti-plus"></i> Ajouter</button>` : ''}
    </div>

    <!-- Conteneur de la table -->
    <div id="twrap"></div>

    ${!closed ? `
    <!-- Bouton de clôture en bas -->
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
      <button class="btn btn-success btn-block" onclick="closeBureauInventory()"><i class="ti ti-lock-check"></i> Clôturer l'inventaire de ce bureau</button>
      <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:6px">Une fois clôturé, il faudra rouvrir pour modifier</div>
    </div>
    ` : ''}
  `;

  renderTable();
}

function renderInventoryHome() {
  const main = document.getElementById('main');
  const name = (currentUser && USER_NAMES[currentUser.toLowerCase()]) || currentUser || '';
  const tot = DB.length + newItems.filter(r => !r._newLoc).length;
  const inv = Object.keys(updates).length;
  const pct = tot ? Math.round(inv / tot * 100) : 0;

  // Calculer les bureaux avec inventaire en cours ou récents
  // Un bureau est "en cours" s'il a au moins 1 article inventorié mais pas 100%
  const bureauStats = {};
  for (const key in LOC_INDEX) {
    const items = LOC_INDEX[key];
    if (!items || !items.length) continue;
    const [site, bat, etage, bureau] = key.split('|');
    const invCount = items.filter(r => updates[r.cbi]).length;
    if (invCount === 0) continue; // Pas commencé
    // Trouver le dernier inventoriste et la dernière date
    let lastTs = 0, lastBy = '';
    for (const r of items) {
      const u = updates[r.cbi];
      if (u && u.ts > lastTs) { lastTs = u.ts; lastBy = u.by || ''; }
    }
    bureauStats[key] = {
      site, bat, etage, bureau,
      total: items.length,
      inv: invCount,
      pct: Math.round(invCount / items.length * 100),
      lastTs, lastBy,
      isComplete: invCount === items.length,
      closed: isBureauClosed(site, bat, etage, bureau)
    };
  }

  // Trier : en cours (non terminés) d'abord, par dernière activité décroissante
  const sorted = Object.values(bureauStats).sort((a, b) => {
    if (a.isComplete !== b.isComplete) return a.isComplete ? 1 : -1;
    return b.lastTs - a.lastTs;
  });
  // 3 catégories : clôturés (priorité), en cours (ouverts non terminés), terminés (ouverts à 100%)
  const clotures = sorted.filter(s => s.closed);
  const enCours = sorted.filter(s => !s.closed && !s.isComplete);
  const termines = sorted.filter(s => !s.closed && s.isComplete);

  main.innerHTML = `<div style="padding:4px 0 20px;max-width:700px;margin:0 auto">
    <!-- En-tête -->
    <div style="margin-bottom:18px">
      <div style="font-size:22px;font-weight:800;letter-spacing:-.02em">Inventaire en cours</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px">Bonjour ${name.split(' ')[0]}, voici les bureaux en cours d'inventaire</div>
    </div>

    <!-- Progression globale compacte -->
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)">
      <div style="flex:1">
        <div style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:4px">Progression globale</div>
        <div class="pbar" style="height:8px;border-radius:4px"><div class="pbar-fill" style="width:${pct}%;border-radius:4px;background:${pct === 100 ? 'var(--success-txt)' : pct > 50 ? 'var(--warn-txt)' : 'var(--accent)'}"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">${inv.toLocaleString('fr-FR')} / ${tot.toLocaleString('fr-FR')} articles</div>
      </div>
      <div style="font-size:28px;font-weight:800;color:${pct === 100 ? 'var(--success-txt)' : pct > 50 ? 'var(--warn-txt)' : 'var(--accent)'};letter-spacing:-.02em">${pct}<span style="font-size:14px;font-weight:600">%</span></div>
    </div>

    ${enCours.length ? `
    <!-- Inventaires en cours -->
    <div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--warn-txt);animation:pulse 1.5s infinite"></span>
        <div style="font-size:14px;font-weight:700">En cours (${enCours.length})</div>
      </div>
      ${enCours.slice(0, 10).map(b => {
        const cbeStr = getCbeFromLoc(b.site, b.bat, b.etage, b.bureau);
        return `
        <div class="hier-row clickable" data-site="${esc(b.site)}" data-bat="${esc(b.bat)}" data-etage="${esc(b.etage)}" data-bureau="${esc(b.bureau)}" style="margin-bottom:8px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer" onclick="resumeInventory(this.parentElement)">
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:700;margin-bottom:3px">${esc(b.bureau)}</div>
              <div class="txt-xs">${esc(b.site)} › ${esc(b.bat)} › ${esc(b.etage)}</div>
              ${cbeStr ? `<div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;font-family:monospace;font-size:10px;font-weight:600;background:var(--accent-bg);color:var(--accent);padding:2px 6px;border-radius:6px"><i class="ti ti-barcode" style="font-size:10px"></i>${esc(cbeStr)}</div>` : ''}
              <div style="font-size:11px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                ${b.lastBy ? `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--accent-bg);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:600"><i class="ti ti-user" style="font-size:11px"></i>${esc(b.lastBy)}</span>` : ''}
                <span style="color:var(--text3);font-size:10px"><i class="ti ti-clock" style="font-size:10px"></i> ${new Date(b.lastTs).toLocaleString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:16px;font-weight:800;color:var(--warn-txt)">${b.pct}%</div>
              <div class="txt-xs">${b.inv}/${b.total}</div>
            </div>
          </div>
          <div class="pbar" style="margin-top:8px"><div class="pbar-fill" style="width:${b.pct}%;background:var(--warn-txt)"></div></div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-sm btn-primary" data-site="${esc(b.site)}" data-bat="${esc(b.bat)}" data-etage="${esc(b.etage)}" data-bureau="${esc(b.bureau)}" onclick="event.stopPropagation();resumeInventory(this)" style="flex:1"><i class="ti ti-clipboard-check"></i> Continuer l'inventaire</button>
            <button class="btn btn-sm" data-site="${esc(b.site)}" data-bat="${esc(b.bat)}" data-etage="${esc(b.etage)}" data-bureau="${esc(b.bureau)}" onclick="event.stopPropagation();openBureauArticles(this)" title="Voir les articles"><i class="ti ti-list"></i></button>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${clotures.length ? `
    <!-- Inventaires clôturés -->
    <details style="margin-bottom:18px" open>
      <summary style="cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:12px;list-style:none;font-size:14px;font-weight:700">
        <i class="ti ti-lock-check" style="color:var(--success-txt)"></i>
        Clôturés (${clotures.length})
        <i class="ti ti-chevron-down" style="margin-left:auto;font-size:14px;color:var(--text3)"></i>
      </summary>
      ${clotures.slice(0, 30).map(b => {
        const cbeStr = getCbeFromLoc(b.site, b.bat, b.etage, b.bureau);
        return `
        <div class="hier-row clickable" data-site="${esc(b.site)}" data-bat="${esc(b.bat)}" data-etage="${esc(b.etage)}" data-bureau="${esc(b.bureau)}" onclick="resumeInventory(this)" style="cursor:pointer;margin-bottom:6px;background:var(--success-bg);border-color:var(--success-ring)">
          <div style="display:flex;align-items:center;gap:12px">
            <i class="ti ti-lock-check" style="color:var(--success-txt);font-size:18px;flex-shrink:0"></i>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700">${esc(b.bureau)}</div>
              <div class="txt-xs">${esc(b.site)} › ${esc(b.bat)} › ${esc(b.etage)} · ${b.inv}/${b.total} articles</div>
              ${cbeStr ? `<div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;font-family:monospace;font-size:10px;font-weight:600;background:var(--success-bg);color:var(--success-txt);padding:2px 6px;border-radius:6px;border:1px solid var(--success-ring)"><i class="ti ti-barcode" style="font-size:10px"></i>${esc(cbeStr)}</div>` : ''}
            </div>
            <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--success-txt);color:#fff;white-space:nowrap">CLÔTURÉ</span>
          </div>
        </div>`;
      }).join('')}
    </details>` : ''}

    ${termines.length ? `
    <!-- Inventaires terminés (collapsé) -->
    <details style="margin-bottom:18px">
      <summary style="cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:12px;list-style:none;font-size:14px;font-weight:700">
        <i class="ti ti-circle-check" style="color:var(--success-txt)"></i>
        Terminés, non clôturés (${termines.length})
        <i class="ti ti-chevron-down" style="margin-left:auto;font-size:14px;color:var(--text3)"></i>
      </summary>
      ${termines.slice(0, 20).map(b => `
        <div class="hier-row clickable" data-site="${esc(b.site)}" data-bat="${esc(b.bat)}" data-etage="${esc(b.etage)}" data-bureau="${esc(b.bureau)}" onclick="resumeInventory(this)" style="cursor:pointer;margin-bottom:6px;background:var(--success-bg);border-color:var(--success-ring)">
          <div style="display:flex;align-items:center;gap:12px">
            <i class="ti ti-circle-check" style="color:var(--success-txt);font-size:18px;flex-shrink:0"></i>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600">${esc(b.bureau)}</div>
              <div class="txt-xs">${esc(b.site)} › ${esc(b.bat)} › ${esc(b.etage)} · ${b.total} articles</div>
              ${b.lastBy ? `<div style="font-size:11px;color:var(--success-txt);margin-top:3px"><i class="ti ti-user" style="font-size:10px"></i> Terminé par ${esc(b.lastBy)}</div>` : ''}
            </div>
            <i class="ti ti-arrow-right" style="font-size:16px;color:var(--text3);flex-shrink:0"></i>
          </div>
        </div>
      `).join('')}
    </details>` : ''}

    ${(!enCours.length && !termines.length && !clotures.length) ? `
    <div style="text-align:center;padding:40px 20px;background:var(--bg);border:1px dashed var(--border2);border-radius:var(--radius-lg)">
      <i class="ti ti-clipboard-list" style="font-size:48px;color:var(--text3);display:block;margin-bottom:12px;opacity:.3"></i>
      <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px">Aucun inventaire commencé</div>

    </div>` : ''}

}

function resumeInventory(el) {
  navigateTo(el.dataset.site, el.dataset.bat, el.dataset.etage, el.dataset.bureau);
}

function openBureauArticles(el) {
  const site = el.dataset.site, bat = el.dataset.bat, etage = el.dataset.etage, bureau = el.dataset.bureau;
  // Articles inventoriés dans ce bureau, triés par date de mise à jour (plus récent en premier)
  const items = (LOC_INDEX[site+'|'+bat+'|'+etage+'|'+bureau] || [])
    .filter(r => updates[r.cbi])
    .sort((a,b) => (updates[b.cbi]?.ts || 0) - (updates[a.cbi]?.ts || 0));
  
  showModal(`<div class="modal-drag"></div><div class="modal-head"><h2><i class="ti ti-list-check"></i> Articles inventoriés</h2><button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body">
    <div style="background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px">
      <div style="font-size:14px;font-weight:700;margin-bottom:2px">${bureau}</div>
      <div style="font-size:12px;color:var(--text2)">${site} › ${bat} › ${etage}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">${items.length} article(s) inventorié(s) — cliquez pour modifier</div>
    </div>
    ${items.map(item => {
      const u = updates[item.cbi];
      const sv = u.serv || item.serv;
      const sc = sv === 'EN SERVICE' ? 'b-service' : sv === 'HORS SERVICE' ? 'b-hors' : 'b-rebut';
      const trouve = u.trouve || '';
      return `<div class="t-row inventoried" data-cbi="${esc(item.cbi)}" onclick="closeModal();setTimeout(()=>openEditItem_cbi(this.dataset.cbi),100)" style="grid-template-columns:1fr 100px 32px;cursor:pointer;border-radius:var(--radius);margin-bottom:6px;border:1px solid var(--border)">
        <div style="overflow:hidden">
          <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.art)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(item.cbi)} · ${u.by || ''} — ${new Date(u.ts).toLocaleString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
          ${trouve === 'NON' ? '<span class="badge" style="background:var(--danger-bg);color:var(--danger-txt);font-size:10px;margin-top:3px;display:inline-block">✗ Non trouvé</span>' : ''}
        </div>
        <div><span class="badge ${sc}" style="font-size:11px">${sv}</span></div>
        <div><i class="ti ti-edit" style="color:var(--text3)"></i></div>
      </div>`;
    }).join('')}
    ${!items.length ? '<div style="text-align:center;padding:30px;color:var(--text2)">Aucun article inventorié</div>' : ''}
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Fermer</button>
      <button class="btn btn-primary" data-site="${site}" data-bat="${bat}" data-etage="${etage}" data-bureau="${bureau}" onclick="closeModal();resumeInventory(this)"><i class="ti ti-clipboard-check"></i> Aller à l'inventaire</button>
    </div>
  </div>`);
}


function debounceRenderTable() { clearTimeout(_rtTimer); _rtTimer = setTimeout(renderTable, 200); }
let _faTimer;
function debounceFilterArticles() { clearTimeout(_faTimer); _faTimer = setTimeout(filterArticlesView, 200); }

function renderTable() {
  const items = getItems();
  const srch = (document.getElementById('srch')?.value || '').toLowerCase();
  const filt = document.getElementById('filt')?.value || '';
  const f = items.filter(r => {
    if (srch && ![r.cbi, r.cbe, (r.art || '').toLowerCase()].some(x => x.includes(srch))) return false;
    if (filt === '__ni') return !updates[r.cbi];
    if (filt && (updates[r.cbi]?.serv || r.serv) !== filt) return false;
    return true;
  });
  // Trier par code barre IMMO (numérique si possible, sinon alphabétique)
  f.sort((a, b) => {
    const ca = (a.cbi || ''), cb = (b.cbi || '');
    const na = parseInt(ca, 10), nb = parseInt(cb, 10);
    if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
    return ca.localeCompare(cb, 'fr', { numeric: true, sensitivity: 'base' });
  });
  const tw = document.getElementById('twrap');
  if (!tw) return;
  if (!f.length) { tw.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">Aucun article</div>'; return; }
  tw.innerHTML = `<div class="table-wrap"><div class="t-head"><div class="col-cbi">Code barre</div><div>Article</div><div>État</div><div></div></div>
    ${f.map(r => {
      const u = updates[r.cbi] || {};
      const sv = u.serv || r.serv;
      const ok = !!updates[r.cbi];
      const sc = sv === 'EN SERVICE' ? 'b-service' : sv === 'HORS SERVICE' ? 'b-hors' : 'b-rebut';
      const tr = u.trouve || '';
      const trBadge = tr === 'OUI' ? '<span style="font-size:11px;color:var(--success-txt);font-weight:700">✓</span>' : tr === 'NON' ? '<span style="font-size:11px;color:var(--danger-txt);font-weight:700">✗</span>' : '';
      // Nom de l'inventoriste (opérateur) qui a traité l'article
      const inv = u.by ? (USER_NAMES[(u.by || '').toLowerCase()] || u.by) : '';
      const invLine = inv ? `<div class="txt-12-muted" style="display:flex;align-items:center;gap:3px;margin-top:1px"><i class="ti ti-user" style="font-size:10px"></i>${esc(inv)}</div>` : '';
      return `<div class="t-row${ok ? ' inventoried' : ''}" onclick="openEditItem_cbi('${esc(r.cbi)}')"><div class="col-cbi" style="font-family:monospace;font-size:12px;color:var(--text2)">${esc(r.cbi)}${r._new ? ` <span class="badge b-new" style="font-size:10px">Nouveau</span>` : ''}</div><div style="overflow:hidden"><div style="font-weight:${ok ? 700 : 400};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px">${esc(r.art)}</div><div class="txt-12-muted">${esc(r.fam)}${trBadge ? ' · ' + trBadge : ''}</div>${invLine}</div><div><span class="badge ${sc}" style="font-size:11px">${sv}</span></div><div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px">${ok ? '<i class="ti ti-check" style="color:var(--success-txt);font-size:18px"></i>' : '<i class="ti ti-circle" style="color:var(--border2);font-size:16px"></i>'}${(photos[r.cbi] || []).length ? '<i class="ti ti-camera" style="font-size:11px;color:var(--info-txt)"></i>' : ''}</div></div>`;
    }).join('')}
  </div>`;
}

//  RECHERCHE EMPLACEMENT
// ─────────────────────────────────────────────────────────────
function onLocSearchScan(e) {
  if (e.key !== 'Enter') return;
  const v = e.target.value.trim();
  e.target.value = '';
  if (!v) return;

  // 1. Recherche exacte dans REL_EMPS sur le CBE
  for (const eid in REL_EMPS) {
    if (REL_EMPS[eid].cbe === v) {
      const e = REL_EMPS[eid];
      const site = (REL_SITES[e.site_id] || {}).site_code;
      const bat = (REL_BATS[e.bat_id] || {}).bat_nom;
      if (site && bat && e.bureau) {
        showLocSearchResult([{ site, bat, etage: e.etage, bureau: e.bureau }], 'Code emplacement : ' + v);
        return;
      }
    }
  }

  // 2. Recherche dans les articles
  const item = findItemByCbe(v);
  if (item) {
    showLocSearchResult([{ site: item.site, bat: item.bat, etage: item.etage, bureau: item.bureau }], 'Code emplacement : ' + v);
    return;
  }

  // 3. Recherche fuzzy (code partiel ou nom de bureau)
  const vLow = v.toLowerCase();
  const matches = [];
  for (const eid in REL_EMPS) {
    const emp = REL_EMPS[eid];
    if ((emp.cbe || '').includes(v) || (emp.bureau || '').toLowerCase().includes(vLow)) {
      const site = (REL_SITES[emp.site_id] || {}).site_code;
      const bat = (REL_BATS[emp.bat_id] || {}).bat_nom;
      if (site && bat && emp.bureau) matches.push({ site, bat, etage: emp.etage, bureau: emp.bureau });
    }
  }
  if (matches.length) {
    showLocSearchResult(matches, `Recherche : "${v}" (${matches.length} résultat${matches.length>1?'s':''})`);
    return;
  }

  showToast('Code emplacement "' + v + '" introuvable', 'warn');
}

let _locSearchTimer;
function debounceLocSearch() {
  clearTimeout(_locSearchTimer);
  _locSearchTimer = setTimeout(performLocTextSearch, 200);
}

function performLocTextSearch() {
  const q = (UF.locSearch || '').trim().toLowerCase();
  const el = document.getElementById('loc-search-results');
  const listEl = document.getElementById('loc-sites-list');
  if (!el) return;
  if (!q || q.length < 2) {
    el.style.display = 'none';
    if (listEl) listEl.style.display = '';
    return;
  }
  // Cacher la liste normale et afficher les résultats
  if (listEl) listEl.style.display = 'none';
  el.style.display = '';

  // Collecter les matches à tous les niveaux (sites, bâtiments, étages, bureaux)
  const matchedSites = new Set();
  const matchedBats = []; // {site, bat}
  const matchedEtages = []; // {site, bat, etage}
  const matchedBureaux = []; // {site, bat, etage, bureau}

  for (const site in HIER) {
    const siteL = site.toLowerCase();
    const siteMatch = siteL.includes(q);
    if (siteMatch) matchedSites.add(site);

    for (const bat in HIER[site]) {
      const batL = bat.toLowerCase();
      const batMatch = batL.includes(q);
      if (batMatch) matchedBats.push({ site, bat });

      for (const etage in HIER[site][bat]) {
        const etageL = etage.toLowerCase();
        const etageMatch = etageL.includes(q);
        if (etageMatch) matchedEtages.push({ site, bat, etage });

        for (const bureau of HIER[site][bat][etage]) {
          const bureauL = bureau.toLowerCase();
          if (bureauL.includes(q)) {
            matchedBureaux.push({ site, bat, etage, bureau });
          }
        }
      }
    }
  }

  const totalMatches = matchedSites.size + matchedBats.length + matchedEtages.length + matchedBureaux.length;
  if (totalMatches === 0) {
    el.innerHTML = '<div class="alert alert-warn"><i class="ti ti-alert-circle"></i>Aucun résultat pour "' + esc(q) + '"</div>';
    return;
  }

  let html = `<div style="font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:600">${totalMatches} résultat${totalMatches > 1 ? 's' : ''} pour "${esc(q)}"</div>`;

  // SECTION SITES
  if (matchedSites.size > 0) {
    html += `<div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);font-weight:700;margin:14px 0 6px"><i class="ti ti-building-skyscraper"></i> Sites (${matchedSites.size})</div>`;
    for (const site of [...matchedSites].sort()) {
      const stats = getStatsFor(site, null, null, null);
      const pctColor = stats.pct === 100 ? 'var(--success-txt)' : stats.pct > 0 ? 'var(--warn-txt)' : 'var(--text3)';
      html += `<div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px">
        <i class="ti ti-building-skyscraper" style="color:var(--accent)"></i>
        <div style="flex:1"><strong>${esc(site)}</strong></div>
        <span style="font-size:13px;font-weight:700;color:${pctColor}">${stats.pct}%</span>
        <span class="txt-xs">${stats.inv}/${stats.total}</span>
        <button class="btn btn-sm" onclick="openEditLocation('${esc(site)}','','','')" title="Modifier"><i class="ti ti-edit"></i></button>
      </div>`;
    }
  }

  // SECTION BÂTIMENTS
  if (matchedBats.length > 0) {
    html += `<div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);font-weight:700;margin:14px 0 6px"><i class="ti ti-building"></i> Bâtiments (${matchedBats.length})</div>`;
    for (const m of matchedBats.slice(0, 30)) {
      const stats = getStatsFor(m.site, m.bat, null, null);
      const pctColor = stats.pct === 100 ? 'var(--success-txt)' : stats.pct > 0 ? 'var(--warn-txt)' : 'var(--text3)';
      html += `<div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px">
        <i class="ti ti-building" style="color:var(--accent)"></i>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600">${esc(m.bat)}</div>
          <div class="txt-xs">${esc(m.site)}</div>
        </div>
        <span style="font-size:13px;font-weight:700;color:${pctColor}">${stats.pct}%</span>
        <span class="txt-xs">${stats.inv}/${stats.total}</span>
        <button class="btn btn-sm" onclick="openEditLocation('${esc(m.site)}','${esc(m.bat)}','','')" title="Modifier"><i class="ti ti-edit"></i></button>
      </div>`;
    }
    if (matchedBats.length > 30) html += `<div class="txt-xs" style="text-align:center;padding:6px">+${matchedBats.length - 30} autres bâtiments…</div>`;
  }

  // SECTION ÉTAGES
  if (matchedEtages.length > 0) {
    html += `<div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);font-weight:700;margin:14px 0 6px"><i class="ti ti-stairs"></i> Étages (${matchedEtages.length})</div>`;
    for (const m of matchedEtages.slice(0, 30)) {
      const stats = getStatsFor(m.site, m.bat, m.etage, null);
      const pctColor = stats.pct === 100 ? 'var(--success-txt)' : stats.pct > 0 ? 'var(--warn-txt)' : 'var(--text3)';
      html += `<div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px">
        <i class="ti ti-stairs" style="color:var(--accent)"></i>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600">${esc(m.etage)}</div>
          <div class="txt-xs">${esc(m.site)} › ${esc(m.bat)}</div>
        </div>
        <span style="font-size:13px;font-weight:700;color:${pctColor}">${stats.pct}%</span>
        <span class="txt-xs">${stats.inv}/${stats.total}</span>
        <button class="btn btn-sm" onclick="openEditLocation('${esc(m.site)}','${esc(m.bat)}','${esc(m.etage)}','')" title="Modifier"><i class="ti ti-edit"></i></button>
      </div>`;
    }
    if (matchedEtages.length > 30) html += `<div class="txt-xs" style="text-align:center;padding:6px">+${matchedEtages.length - 30} autres étages…</div>`;
  }

  // SECTION BUREAUX
  if (matchedBureaux.length > 0) {
    html += `<div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);font-weight:700;margin:14px 0 6px"><i class="ti ti-door"></i> Bureaux (${matchedBureaux.length})</div>`;
    for (const r of matchedBureaux.slice(0, 50)) {
      const stats = getStatsFor(r.site, r.bat, r.etage, r.bureau);
      const pctColor = stats.pct === 100 ? 'var(--success-txt)' : stats.pct > 0 ? 'var(--warn-txt)' : 'var(--text3)';
      const cbe = getCbeFromLoc(r.site, r.bat, r.etage, r.bureau);
      html += `<div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px">
        <i class="ti ti-door" style="color:var(--accent)"></i>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600">${esc(r.bureau)}</div>
          <div class="txt-xs">${esc(r.site)} › ${esc(r.bat)} › ${esc(r.etage)}</div>
          ${cbe ? `<div style="font-family:monospace;font-size:10px;color:var(--accent);font-weight:600;margin-top:2px"><i class="ti ti-barcode" style="font-size:10px"></i> ${esc(cbe)}</div>` : ''}
        </div>
        <span style="font-size:13px;font-weight:700;color:${pctColor}">${stats.pct}%</span>
        <span class="txt-xs">${stats.inv}/${stats.total}</span>
        <button class="btn btn-sm" data-site="${esc(r.site)}" data-bat="${esc(r.bat)}" data-etage="${esc(r.etage)}" data-bureau="${esc(r.bureau)}" onclick="goToInventory(this)" title="Inventaire"><i class="ti ti-clipboard-check"></i></button>
        <button class="btn btn-sm" onclick="openEditLocation('${esc(r.site)}','${esc(r.bat)}','${esc(r.etage)}','${esc(r.bureau)}')" title="Modifier"><i class="ti ti-edit"></i></button>
      </div>`;
    }
    if (matchedBureaux.length > 50) html += `<div class="txt-xs" style="text-align:center;padding:6px">+${matchedBureaux.length - 50} autres bureaux…</div>`;
  }

  el.innerHTML = html;
}

function showLocSearchResult(results, query, totalCount) {
  const el = document.getElementById('loc-search-results');
  const listEl = document.getElementById('loc-sites-list');
  if (!el) return;
  if (listEl) listEl.style.display = 'none';

  if (!results.length) {
    el.innerHTML = '<div class="alert alert-warn"><i class="ti ti-alert-circle"></i>Aucun emplacement trouvé pour "' + query + '"</div>';
    return;
  }
  const tot = totalCount !== undefined ? totalCount : results.length;
  el.innerHTML = `<div style="font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:600">${tot} résultat${tot > 1 ? 's' : ''}${tot > results.length ? ' (' + results.length + ' affichés)' : ''} pour "${query}"</div>` +
    results.map(r => {

function clearLocSearch() {
  const txt = document.getElementById('loc-search-text');
  const scan = document.getElementById('loc-search-scan');
  if (txt) txt.value = '';
  if (scan) scan.value = '';
  setFilter('locSearch', '');
  const el = document.getElementById('loc-search-results');
  const listEl = document.getElementById('loc-sites-list');
  if (el) el.style.display = 'none';
  if (listEl) listEl.style.display = '';
}
function toggleLocSite(card, site) {
  const content = card.querySelector('.loc-site-content');
  const chevron = card.querySelector('.ti-chevron-down');
  if (!content) return;
  if (content.style.display === 'none') {
    content.style.display = 'block';
    if (chevron) chevron.style.transform = 'rotate(180deg)';
    // Lazy render: rendre le contenu seulement à l'ouverture
    if (!content.dataset.loaded) {
      content.dataset.loaded = '1';
      renderLocSiteContent(content, site);
    }
  } else {
    content.style.display = 'none';
    if (chevron) chevron.style.transform = '';
  }
}
function renderLocSiteContent(container, site) {
  let bats = Object.keys(HIER[site] || {}).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));
  // Appliquer le filtre bâtiment si actif et qu'on est sur le site filtré
  if (UF.locSiteFilter === site && UF.locBatFilter !== 'all') {
    bats = bats.filter(b => b === UF.locBatFilter);
  }
  let html = '';
  bats.forEach(bat => {
    let etages = Object.keys((HIER[site] || {})[bat] || {}).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));
    // Appliquer le filtre étage si actif
    if (UF.locSiteFilter === site && UF.locBatFilter === bat && UF.locEtageFilter !== 'all') {
      etages = etages.filter(e => e === UF.locEtageFilter);
    }
    const batStats = getStatsFor(site, bat, null, null);

// ─── Ajout d'un article au RÉFÉRENTIEL uniquement (sans bien physique) ───
function openAddRefArticle() {
  const fams = Object.keys(REL_FAMS).map(fid => REL_FAMS[fid].famille_nom).sort();
  showModal(`<div class="modal-drag"></div>
    <div class="modal-head">
      <h2><i class="ti ti-plus"></i> Nouvel article référentiel</h2>
      <button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="alert alert-info" style="margin-bottom:14px">
        <i class="ti ti-info-circle"></i>
        <div>Ajout d'un <strong>type d'article</strong> dans le référentiel — sans créer de bien physique. Sera disponible immédiatement dans les listes déroulantes.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Famille * <span class="txt-xs" style="font-weight:400">(existante ou nouvelle)</span></label>
        <input type="text" id="ra-fam" list="raFamList" placeholder="Sélectionnez ou tapez une nouvelle famille…" autocomplete="off">
        <datalist id="raFamList">${fams.map(f => `<option value="${esc(f)}"></option>`).join('')}</datalist>
      </div>

      <div class="form-group">
        <label class="form-label">Nom de l'article *</label>
        <input type="text" id="ra-art" placeholder="Ex: Ordinateur portable HP ProBook 450" autocomplete="off">
        <div id="ra-art-msg" class="txt-xs" style="margin-top:-4px;display:none"></div>
      </div>

      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveRefArticle()"><i class="ti ti-plus"></i> Ajouter au référentiel</button>
      </div>
    </div>`);

  // Vérification temps réel des doublons
  const artInp = document.getElementById('ra-art');
  const famInp = document.getElementById('ra-fam');
  const msg = document.getElementById('ra-art-msg');
  const checkDuplicate = () => {
    const art = artInp.value.trim().toLowerCase();
    const fam = famInp.value.trim().toLowerCase();
    if (!art) { msg.style.display = 'none'; return; }
    const dup = Object.values(REL_ARTS).find(a =>
      a.article_nom.toLowerCase() === art &&
      (!fam || a.famille_nom.toLowerCase() === fam)
    );
    if (dup) {
      msg.style.display = 'block';
      msg.style.color = 'var(--warn-txt)';
      msg.innerHTML = `⚠ Cet article existe déjà dans la famille "${esc(dup.famille_nom)}"`;
    } else {
      msg.style.display = 'block';
      msg.style.color = 'var(--success-txt)';
      msg.innerHTML = `✓ Nouvel article disponible`;
    }
  };
  artInp.addEventListener('input', checkDuplicate);
  famInp.addEventListener('input', checkDuplicate);
}

async function saveRefArticle() {
  const famNom = document.getElementById('ra-fam').value.trim();
  const artNom = document.getElementById('ra-art').value.trim();
  if (!famNom) { showToast('La famille est requise', 'warn'); return; }
  if (!artNom) { showToast("Le nom de l'article est requis", 'warn'); return; }

  // Doublon strict (même article dans la même famille)
  const dup = Object.values(REL_ARTS).find(a =>
    a.article_nom.toLowerCase() === artNom.toLowerCase() &&
    (a.famille_nom||'').toLowerCase() === famNom.toLowerCase()
  );
  if (dup) { showToast('Cet article existe déjà dans cette famille', 'warn'); return; }

  if (!currentUser || !navigator.onLine || !initSupabase()) {
    showToast('Connexion requise pour ajouter un article au référentiel', 'warn'); return;
  }

  try {
    // 1. Trouver ou créer la famille
    let famille_id = null;
    for (const fid in REL_FAMS) if ((REL_FAMS[fid].famille_nom||'').toLowerCase() === famNom.toLowerCase()) { famille_id = fid; break; }
    const isNewFam = !famille_id;
    if (isNewFam) {
      famille_id = genFamId();
      const { error } = await sb.from('familles').insert({ famille_id, famille_nom: famNom });
      if (error) throw new Error('famille: ' + error.message);
      REL_FAMS[famille_id] = { famille_id, famille_nom: famNom };
      if (!FAMS[famNom]) FAMS[famNom] = [];
      logActivity('ADD_FAMILLE', famNom, famille_id);
    }

    // 2. Créer l'article dans Supabase
    const article_id = genArtId();
    const { error: errA } = await sb.from('articles').insert({ article_id, article_nom: artNom, famille_id });
    if (errA) throw new Error('article: ' + errA.message);

    // 3. Mettre à jour le cache local (avec famille_nom pour la sélection d'inventaire)
    REL_ARTS[article_id] = { article_id, article_nom: artNom, famille_id, famille_nom: famNom };
    if (!FAMS[famNom]) FAMS[famNom] = [];
    if (!FAMS[famNom].includes(artNom)) FAMS[famNom].push(artNom);

    // 4. Reconstruire la hiérarchie (FAMS) pour que l'article apparaisse partout
    buildHier();
    invalidateAllItemsCache();
    saveLocal();
    saveDBCache();
    closeModal();
    if (typeof renderArticlesView === 'function') renderArticlesView();
    showToast(`Article "${artNom}" ajouté${isNewFam ? ' (nouvelle famille "'+famNom+'")' : ''}`, 'success');
    logActivity('ADD_REF_ARTICLE', `${artNom} dans ${famNom}`, article_id);
  } catch(e) {
    showToast('Erreur ajout: ' + e.message, 'danger');
    console.error('saveRefArticle', e);
  }
}

function filterArticlesView() {
  const all = getAllItems().filter(r => !r._newLoc);
  const srch = (UF.artSearch || '').toLowerCase();
  const filt = (UF.artFilt || '');
  let filtered = all.filter(r => {
    if (srch && ![r.cbi, r.cbe, (r.art || '').toLowerCase(), (r.fam || '').toLowerCase()].some(x => x.includes(srch))) return false;
    if (filt === '__inv') return !!updates[r.cbi];
    if (filt === '__non') return !updates[r.cbi];
    if (filt === 'OUI' || filt === 'NON') return (updates[r.cbi]?.trouve || '') === filt;
    return true;
  });
  const total = filtered.length;
  filtered = filtered.slice(0, _artLimit);
  const el = document.getElementById('art-list');
  if (!el) return;
  if (!filtered.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">Aucun article</div>'; return; }
  el.innerHTML = `<div class="table-wrap"><div class="t-head"><div class="col-cbi">Code barre</div><div>Article</div><div>État</div><div></div></div>${filtered.map(r => {
    const u = updates[r.cbi] || {};
    const sv = u.serv || r.serv;
    const ok = !!updates[r.cbi];
    const sc = sv === 'EN SERVICE' ? 'b-service' : sv === 'HORS SERVICE' ? 'b-hors' : 'b-rebut';
    return `<div class="t-row${ok ? ' inventoried' : ''}" data-cbi="${esc(r.cbi)}" onclick="openEditItem_cbi(this.dataset.cbi)"><div class="col-cbi" style="font-family:monospace;font-size:12px;color:var(--text2)">${esc(r.cbi)}</div><div style="overflow:hidden"><div style="font-weight:${ok ? 700 : 400};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px">${esc(r.art)}</div><div class="txt-xs">${esc(r.fam)} · ${esc(r.bureau)}</div></div><div><span class="badge ${sc}" style="font-size:11px">${sv}</span></div><div style="text-align:center">${ok ? '<i class="ti ti-check" style="color:var(--success-txt)"></i>' : ''}</div></div>`;
  }).join('')}</div>${total > 50 ? `<div style="text-align:center;padding:12px"><div style="font-size:12px;color:var(--text2);margin-bottom:8px">${total} résultats — ${filtered.length} affichés</div><button class="btn btn-sm" onclick="showMoreArticles()"><i class="ti ti-plus"></i> Afficher plus</button></div>` : ''}`;
}

let _refArtTimer;
function debounceFilterRefArticles() { clearTimeout(_refArtTimer); _refArtTimer = setTimeout(filterRefArticles, 200); }
function showMoreRefArticles() { _refArtLimit += 100; filterRefArticles(); }

function filterRefArticles() {
  const el = document.getElementById('ref-art-list');
  if (!el) return;
  const srch = (UF.refArtSearch || '').trim().toLowerCase();
  const famFilt = UF.refArtFilt || '';

  // Compter biens physiques par article_id
  const usageByArt = {};
  for (const r of DB) if (r.article_id) usageByArt[r.article_id] = (usageByArt[r.article_id] || 0) + 1;
  for (const r of newItems) if (r.article_id) usageByArt[r.article_id] = (usageByArt[r.article_id] || 0) + 1;

  // Construire la liste à partir de REL_ARTS
  const allArts = Object.values(REL_ARTS).map(a => ({
    ...a,
    usage: usageByArt[a.article_id] || 0
  }));

  let filtered = allArts;
  if (famFilt) filtered = filtered.filter(a => a.famille_nom === famFilt);
  if (srch) filtered = filtered.filter(a =>
    (a.article_nom || '').toLowerCase().includes(srch) ||
    (a.famille_nom || '').toLowerCase().includes(srch)
  );
  // Tri : famille puis nom
  filtered.sort((a, b) => (a.famille_nom + a.article_nom).localeCompare(b.famille_nom + b.article_nom));

  const total = filtered.length;
  const shown = filtered.slice(0, _refArtLimit);

  if (!shown.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">Aucun article référentiel</div>'; return; }

  el.innerHTML = `<div style="font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:600">${total.toLocaleString('fr-FR')} type${total > 1 ? 's' : ''} d'article${total > 1 ? 's' : ''}${shown.length < total ? ' · ' + shown.length + ' affichés' : ''}</div>` + shown.map(a => `
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${esc(a.article_nom)}</div>
        <div class="txt-xs">${esc(a.famille_nom)} · ID ${esc(a.article_id)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:14px;font-weight:700;color:${a.usage > 0 ? 'var(--accent)' : 'var(--text3)'}">${a.usage.toLocaleString('fr-FR')}</div>
        <div class="txt-xs">${a.usage > 1 ? 'biens' : 'bien'}</div>
      </div>
      ${can('canDelete') ? `<button class="btn btn-icon" style="color:${a.usage > 0 ? 'var(--text3)' : 'var(--danger-txt)'}" data-aid="${esc(a.article_id)}" data-anom="${esc(a.article_nom)}" data-usage="${a.usage}" onclick="confirmDeleteRefArticle(this)" title="${a.usage > 0 ? 'Suppression impossible (biens rattachés)' : 'Supprimer cet article'}"><i class="ti ti-trash"></i></button>` : ''}
    </div>
  `).join('') + (total > shown.length ? `<div style="text-align:center;padding:12px"><button class="btn btn-sm" onclick="showMoreRefArticles()"><i class="ti ti-plus"></i> Afficher plus</button></div>` : '');
}

// ─────────────────────────────────────────────────────────────
//  SUPPRESSION D'ARTICLE RÉFÉRENTIEL (admin uniquement)
// ─────────────────────────────────────────────────────────────
function confirmDeleteRefArticle(btn) {
  if (!can('canDelete')) { showToast('Accès refusé — administrateur uniquement', 'danger'); return; }
  const aid = btn.dataset.aid;
  const anom = btn.dataset.anom;
  const usage = parseInt(btn.dataset.usage) || 0;
  if (usage > 0) {
    showToast(`Impossible de supprimer "${anom}" : ${usage} bien(s) physique(s) rattaché(s).`, 'danger');
    return;
  }
  if (!confirm(`Supprimer l'article référentiel "${anom}" ?\n\nCette action est irréversible. Aucun bien physique n'y est rattaché.`)) return;
  doDeleteRefArticle(aid, anom);
}

async function doDeleteRefArticle(aid, anom) {
  try {
    const art = REL_ARTS[aid];
    if (!art) return;
    const famille_nom = art.famille_nom;
    // Supprimer dans Supabase
    if (currentUser && navigator.onLine && sb) {
      const { error } = await sb.from('articles').delete().eq('article_id', aid);
      if (error) throw error;
    }
    // Retirer du cache local
    delete REL_ARTS[aid];
    if (FAMS[famille_nom]) FAMS[famille_nom] = FAMS[famille_nom].filter(a => a !== anom);
    buildHier();
    invalidateAllItemsCache();
    saveLocal();
    saveDBCache();
    filterRefArticles();
    showToast(`Article "${anom}" supprimé du référentiel`, 'success');
    logActivity('DELETE_REF_ARTICLE', `${anom} (${famille_nom})`, aid);
  } catch(e) {
    showToast('Erreur suppression: ' + e.message, 'danger');
    console.error(e);
  }
}

// ─── CLÔTURE D'INVENTAIRE PAR BUREAU ─────────────────────────
// Clé normalisée d'un bureau
function bureauKey(site, bat, etage, bureau) { return `${site}|${bat}|${etage}|${bureau}`; }
// Un bureau est-il clôturé ?
function isBureauClosed(site, bat, etage, bureau) {
  const k = bureauKey(site, bat, etage, bureau);
  return !!(bureauStatuts[k] && bureauStatuts[k].closed);
}
// Clôturer ou rouvrir un bureau (persisté dans la feuille BureauStatuts)
async function setBureauClosed(site, bat, etage, bureau, closed) {
  const k = bureauKey(site, bat, etage, bureau);
  const ts = Date.now();
  bureauStatuts[k] = { closed: !!closed, by: currentUser || '', ts };
  saveLocal();
  // Écriture distante (best-effort, file d'attente si hors-ligne)
  if (gTok && navigator.onLine) {
    try { await writeBureauStatut(site, bat, etage, bureau, closed, ts); }
    catch(e) { pendingWrites.push({ type: 'bs', d: { site, bat, etage, bureau, closed, ts, by: currentUser || '' } }); saveLocal(); }
  } else {
    pendingWrites.push({ type: 'bs', d: { site, bat, etage, bureau, closed, ts, by: currentUser || '' } });
    saveLocal();
    renderPendingIndicator();
  }
}
// Écrit une ligne dans la feuille BureauStatuts (upsert par clé)
async function writeBureauStatut(site, bat, etage, bureau, closed, ts) {
  if (!currentUser || !navigator.onLine || !sb) {
    if (!navigator.onLine) showToast('Hors-ligne — clôture enregistrée au retour', 'warn');
    return;
  }
  const k = bureauKey(site, bat, etage, bureau);
  const row = {
    cle: k, site, batiment: bat, etage, bureau,
    statut: closed ? 'CLOTURE' : 'OUVERT',
    par: currentUser || '', le: new Date(ts || Date.now()).toISOString()
  };
  // upsert sur la clé primaire `cle` (insère ou met à jour)
  const { error } = await sb.from('bureau_statuts').upsert(row, { onConflict: 'cle' });
  if (error) { console.error('writeBureauStatut', error); showToast('Erreur clôture: ' + error.message, 'danger'); }
}

// Statut d'un bureau d'après son avancement
function getBureauDashStatut(stats) {
  if (!stats.total) return 'VIDE';
  if (stats.pct === 100) return 'TERMINE';
  if (stats.pct > 0) return 'EN COURS';
  return 'NON TRAITE';
}

// Action : clôturer l'inventaire du bureau courant
async function closeBureauInventory() {
  const { site, bat, etage, bureau } = curLoc;
  if (!bureau) return;
  const items = getItems();
  const inv = items.filter(r => updates[r.cbi]).length;
  const reste = items.length - inv;
  let msg = `Clôturer l'inventaire de « ${bureau} » ?\n\n`;
  if (reste > 0) msg += `⚠ ${reste} article(s) ne sont pas encore mis à jour.\n\n`;
  msg += `Une fois clôturé, plus aucune modification ni ajout ne sera possible sur ce bureau sans le rouvrir.`;
  if (!confirm(msg)) return;
  await setBureauClosed(site, bat, etage, bureau, true);
  showToast(`Inventaire de « ${bureau} » clôturé`, 'success');
  logActivity('CLOTURE_BUREAU', `${site} › ${bat} › ${etage} › ${bureau}`, bureauKey(site, bat, etage, bureau));
  renderMain();
}

// Action : rouvrir l'inventaire du bureau courant
async function reopenBureauInventory() {
  const { site, bat, etage, bureau } = curLoc;
  if (!bureau) return;
  if (!confirm(`Rouvrir l'inventaire de « ${bureau} » ?\n\nLes modifications et ajouts redeviendront possibles.`)) return;
  await setBureauClosed(site, bat, etage, bureau, false);
  showToast(`Inventaire de « ${bureau} » rouvert`, 'info');
  logActivity('REOUVERTURE_BUREAU', `${site} › ${bat} › ${etage} › ${bureau}`, bureauKey(site, bat, etage, bureau));
  renderMain();
}

// Construire la liste de tous les bureaux avec leurs stats
function buildDashBureauData() {
  const data = [];
  for (const site of Object.keys(HIER).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }))) {
    for (const bat of Object.keys(HIER[site]).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }))) {
      for (const etage of Object.keys(HIER[site][bat]).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }))) {
        for (const bureau of HIER[site][bat][etage]) {
          const stats = getStatsFor(site, bat, etage, bureau);
          // Inclure aussi les bureaux vides (0 article) — ils apparaîtront en "À INVENTORIER"
          const statut = getBureauDashStatut(stats);
          const info = getBureauLastInfo(site, bat, etage, bureau);
          const closed = isBureauClosed(site, bat, etage, bureau);
          data.push({ site, bat, etage, bureau, stats, statut, closed, lastTs: info.lastTs, lastBy: info.lastBy });
        }
      }
    }
  }
  return data;
}

function renderDashboardList() {
  let data = buildDashBureauData();
  if (UF.dashSiteFilter !== 'all') data = data.filter(b => b.site === UF.dashSiteFilter);
  if (UF.dashBatFilter !== 'all') data = data.filter(b => b.bat === UF.dashBatFilter);
  if (UF.dashEtageFilter !== 'all') data = data.filter(b => b.etage === UF.dashEtageFilter);

  // Compteurs par statut (VIDE = bureau sans articles, comptabilisé comme "non traité")
  const counts = {
    all: data.length,
    en_cours: data.filter(b => b.statut === 'EN COURS').length,
    non_traite: data.filter(b => b.statut === 'NON TRAITE' || b.statut === 'VIDE').length,
    termine: data.filter(b => b.statut === 'TERMINE').length,
    cloture: data.filter(b => b.closed).length
  };

  // Filtre par statut
  let filtered = data;
  if (UF.dashFilter === 'en_cours') filtered = data.filter(b => b.statut === 'EN COURS');
  else if (UF.dashFilter === 'non_traite') filtered = data.filter(b => b.statut === 'NON TRAITE' || b.statut === 'VIDE');
  else if (UF.dashFilter === 'termine') filtered = data.filter(b => b.statut === 'TERMINE');
  else if (UF.dashFilter === 'cloture') filtered = data.filter(b => b.closed);

  // Filtre par recherche
  if (UF.dashSearch && UF.dashSearch.length >= 2) {
    const q = UF.dashSearch.toLowerCase();
    filtered = filtered.filter(b =>
      (b.bureau + ' ' + b.etage + ' ' + b.bat + ' ' + b.site).toLowerCase().includes(q)
    );
  }

  // Tri : EN COURS par date récente, TERMINE par date récente, NON TRAITE alphabétique
  filtered.sort((a, b) => {
    if (a.statut === 'EN COURS' && b.statut === 'EN COURS') return b.lastTs - a.lastTs;
    if (a.statut === 'TERMINE' && b.statut === 'TERMINE') return b.lastTs - a.lastTs;
    if (a.statut !== b.statut) {
      const order = { 'EN COURS': 0, 'NON TRAITE': 1, 'TERMINE': 2 };
      return (order[a.statut] || 99) - (order[b.statut] || 99);
    }
    return (a.site + a.bat + a.bureau).localeCompare(b.site + b.bat + b.bureau);
  });

  // Mettre à jour les boutons filtre
  const filterBtns = document.getElementById('dash-filter-btns');
  if (filterBtns) {
    const btn = (key, label, color, icon) => {
      const active = UF.dashFilter === key;
      const cnt = counts[key];
      const bg = active ? `background:${color};color:#fff;border-color:${color}` : '';
      return `<button class="btn btn-sm" style="min-height:34px;font-size:12px;flex:1;min-width:130px;${bg}" onclick="setDashFilter('${key}')"><i class="ti ${icon}"></i> ${label} <span style="opacity:.8">(${cnt})</span></button>`;
    };
    filterBtns.innerHTML = [
      btn('en_cours', 'En cours', 'var(--warn-txt)', 'ti-clock'),
      btn('non_traite', 'Non traités', '#6b7280', 'ti-circle-dashed'),
      btn('termine', 'Terminés', 'var(--success-txt)', 'ti-circle-check'),
      btn('cloture', 'Clôturés', 'var(--success-txt)', 'ti-lock-check'),
      btn('all', 'Tous', 'var(--accent)', 'ti-layout-grid'),
    ].join('');
  }

  const container = document.getElementById('dash-list-container');
  if (!container) return;

  if (!filtered.length) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">
      <i class="ti ti-filter-off" style="font-size:48px;opacity:.3;display:block;margin-bottom:10px"></i>
      Aucun emplacement ne correspond à ce filtre
    </div>`;
    return;
  }

  // Header avec compteur + bouton aller à l'inventaire
  const statutLabel = { en_cours: 'en cours', non_traite: 'non traités', termine: 'terminés', cloture: 'clôturés', all: 'au total' }[UF.dashFilter];
  const headerHTML = `<div style="font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:600">
    ${filtered.length} emplacement${filtered.length > 1 ? 's' : ''} ${statutLabel}${UF.dashSiteFilter !== 'all' ? ' à ' + esc(UF.dashSiteFilter) : ''}
  </div>`;

  container.innerHTML = headerHTML + filtered.map(b => dashBureauCard(b)).join('');
}

function onLocScanKey(e) {
  if (e.key !== 'Enter') return;
  const v = e.target.value.trim();
  e.target.value = '';
  if (!v) return;
  if (!DB.length && !Object.keys(REL_EMPS).length) { showLocFb('Chargez d\'abord les données', 'warn'); return; }

  // 1. Recherche exacte dans REL_EMPS sur le CBE
  for (const eid in REL_EMPS) {
    if (REL_EMPS[eid].cbe === v) {
      const e = REL_EMPS[eid];
      const site = (REL_SITES[e.site_id] || {}).site_code;
      const bat = (REL_BATS[e.bat_id] || {}).bat_nom;
      if (site && bat && e.bureau) {
        navigateTo(site, bat, e.etage, e.bureau);
        showLocFb('✓ ' + e.bureau, 'success');
        closeSidebar();
        return;
      }
    }
  }

  // 2. Recherche dans les articles (cas où CBE est rattaché à un article)
  const foundItem = findItemByCbe(v);
  if (foundItem && foundItem.bureau) {
    navigateTo(foundItem.site, foundItem.bat, foundItem.etage, foundItem.bureau);
    showLocFb('✓ ' + foundItem.bureau, 'success');
    closeSidebar();
    return;
  }

  // 3. Recherche fuzzy : nom de bureau ou code partiel
  const vLow = v.toLowerCase();
  const matches = [];
  for (const eid in REL_EMPS) {
    const emp = REL_EMPS[eid];
    if ((emp.cbe || '').includes(v) ||
        (emp.bureau || '').toLowerCase().includes(vLow)) {
      const site = (REL_SITES[emp.site_id] || {}).site_code;
      const bat = (REL_BATS[emp.bat_id] || {}).bat_nom;
      if (site && bat && emp.bureau) matches.push({ site, bat, etage: emp.etage, bureau: emp.bureau, cbe: emp.cbe });
    }
  }
  if (matches.length === 1) {
    const m = matches[0];
    navigateTo(m.site, m.bat, m.etage, m.bureau);
    showLocFb('✓ ' + m.bureau + (m.cbe ? ` (${m.cbe})` : ''), 'success');
    closeSidebar();
    return;
  }
  if (matches.length > 1) {
    showLocFb(`${matches.length} correspondances trouvées — précisez`, 'warn');
    return;
  }

  showLocFb(`"${v}" introuvable`, 'warn');
}
function navigateTo(site, bat, etage, bureau) {
  document.getElementById('sel-site').value = site;
  curLoc = { site, bat: '', etage: '', bureau: '' };
  const bb = document.getElementById('sel-bat');
  bb.innerHTML = '<option value="">-- Bâtiment --</option>';
  bb.disabled = false;
  if (HIER[site]) Object.keys(HIER[site]).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' })).forEach(b => bb.innerHTML += `<option value="${esc(b)}">${esc(b)}</option>`);
  bb.value = bat; curLoc.bat = bat;
  const ee = document.getElementById('sel-etage');
  ee.innerHTML = '<option value="">-- Étage --</option>';
  ee.disabled = false;
  if (HIER[site] && HIER[site][bat]) Object.keys(HIER[site][bat]).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' })).forEach(e => ee.innerHTML += `<option value="${esc(e)}">${esc(e)}</option>`);
  ee.value = etage; curLoc.etage = etage;
  const bu = document.getElementById('sel-bureau');
  bu.innerHTML = '<option value="">-- Bureau --</option>';
  bu.disabled = false;
  if (HIER[site] && HIER[site][bat] && HIER[site][bat][etage]) HIER[site][bat][etage].forEach(br => bu.innerHTML += `<option value="${esc(br)}">${esc(br)}</option>`);
  bu.value = bureau; curLoc.bureau = bureau;
  renderMain();
  if (bureau) pushHistoryState(); // entrer dans un bureau = nouvel état (retour = revenir à la liste)
}
function showLocFb(msg, type) {
  const el = document.getElementById('loc-feedback');
  if (!el) return;
  const bg = { success: 'var(--success-bg)', warn: 'var(--warn-bg)', info: 'var(--info-bg)', danger: 'var(--danger-bg)' };
  const tc = { success: 'var(--success-txt)', warn: 'var(--warn-txt)', info: 'var(--info-txt)', danger: 'var(--danger-txt)' };
  el.style.cssText = `display:block;font-size:12px;margin-bottom:8px;padding:6px 10px;border-radius:6px;background:${bg[type]};color:${tc[type]}`;
  el.textContent = msg;
  clearTimeout(window.lfT);
  window.lfT = setTimeout(() => el.style.display = 'none', 3500);
}


// ---------- SCAN ARTICLE (dans vue inventaire) ----------
function onScanKey(e) {
  if (e.key !== 'Enter') return;
  const v = e.target.value.trim();
  e.target.value = '';
  if (!v) return;
  if (!curLoc.bureau) { showToast('Sélectionnez un emplacement d\u2019abord', 'warn'); return; }

  // Chercher dans toute la base (DB + nouveaux articles)
  const item = findItemByCode(v);

  // ════════════════════════════════════════════════════════════
  // CAS 3 : Code barre INCONNU → proposer d'ajouter manuellement
  // ════════════════════════════════════════════════════════════
  if (!item) {
    showCodeNotFoundModal(v);
    return;
  }

  // L'article existe dans la base
  const isHere = item.site === curLoc.site && item.bat === curLoc.bat
              && item.etage === curLoc.etage && item.bureau === curLoc.bureau;

  if (isHere) {
    // ══════════════════════════════════════════════════════════
    // CAS 1 : Article DANS le bureau actuel → mise à jour
    // ══════════════════════════════════════════════════════════
    openEditItem(item);
  } else {
    // ══════════════════════════════════════════════════════════
    // CAS 2 : Article AILLEURS → proposer le transfert
    // ══════════════════════════════════════════════════════════
    openTransferModal(item);
  }
}

function refreshTransferArticleDatalist(famVal) {

async function confirmTransferAndUpdate(cbi) {
  const item = findItemByCbi(cbi);
  if (!item || !curLoc.bureau) return;

  // Trouver l'emp_id du nouvel emplacement
  const newEmpId = findEmpIdByLocation(curLoc.site, curLoc.bat, curLoc.etage, curLoc.bureau);
  if (!newEmpId) { showToast('Emplacement introuvable dans le référentiel', 'danger'); return; }

  const oldLoc = item.site + ' › ' + item.bat + ' › ' + item.etage + ' › ' + item.bureau;
  const oldEmpId = item.emp_id || '';

  // 1. Récupérer les valeurs du formulaire
  const trouveEl = document.querySelector('input[name="t-trouve"]:checked');
  const newProd = (document.getElementById('t-prod')?.value || '').trim();
  const u = {
    serv: document.getElementById('t-sv').value,
    renouv: document.getElementById('t-rv').value,
    obs: document.getElementById('t-obs').value,
    trouve: trouveEl ? trouveEl.value : 'OUI',
    by: currentUser,
    ts: Date.now()
  };

  // 1bis. Gestion des modifications des CARACTÉRISTIQUES (fam, art, marque, modèle, série)
  const famEl = document.getElementById('t-fam');
  const artEl = document.getElementById('t-art');
  if (famEl && artEl) {
    const newFam = famEl.value.trim();
    const newArt = artEl.value.trim();
    const newMarque = document.getElementById('t-marque').value.trim();
    const newModele = document.getElementById('t-modele').value.trim();
    const newSerie = document.getElementById('t-serie').value.trim();
    const charChanged = (newFam !== (item.fam || '') || newArt !== (item.art || '') ||
                        newMarque !== (item.marque || '') || newModele !== (item.modele || '') ||
                        newSerie !== (item.serie || ''));
    if (charChanged && newFam && newArt) {
      // Créer la famille si nouvelle
      let famille_id = null;
      for (const fid in REL_FAMS) if (REL_FAMS[fid].famille_nom === newFam) { famille_id = fid; break; }
      if (!famille_id) {
        famille_id = genFamId();
        REL_FAMS[famille_id] = { famille_id, famille_nom: newFam };
        if (!FAMS[newFam]) FAMS[newFam] = [];
        if (gTok) { try { await sAppend('Familles', [[famille_id, newFam]]); } catch(e) { console.error('Echec ajout famille distante', e); } }
      }
      // Créer l'article si nouveau
      let article_id = null;
      for (const aid in REL_ARTS) if (REL_ARTS[aid].article_nom === newArt && REL_ARTS[aid].famille_id === famille_id) { article_id = aid; break; }
      if (!article_id) {
        article_id = genArtId();
        REL_ARTS[article_id] = { article_id, article_nom: newArt, famille_id, famille_nom: newFam };
        if (!FAMS[newFam].includes(newArt)) FAMS[newFam].push(newArt);
        if (gTok) { try { await sAppend('Articles', [[article_id, newArt, famille_id]]); } catch(e) { console.error('Echec ajout article distant', e); } }
      }
      // Mettre à jour l'item
      const oldArt = item.art;
      item.fam = newFam;
      item.art = newArt;
      item.article_id = article_id;
      item.marque = newMarque;
      item.modele = newModele;
      item.serie = newSerie;
      logActivity('EDIT_ITEM', `${oldArt} → ${newArt}${newMarque ? ' / ' + newMarque : ''}${newModele ? ' ' + newModele : ''}`, cbi);
    }
  }

  // Si N° Amendis modifié, mettre à jour l'item
  const prodChanged = newProd !== (item.prod || '');
  if (prodChanged) {
    item.prod = newProd;
  }

  // Synchroniser la ligne Inventaire si caractéristiques ou N° Amendis modifié
  if (gTok) { try { await updateInventoryRow(item); } catch(e) { console.error('Echec maj ligne Inventaire', e); } }

  // Ajouter la mention du transfert dans l'observation
  const transferNote = 'TRANSFÉRÉ de ' + oldLoc + ' le ' + new Date().toLocaleDateString('fr-FR');
  u.obs = u.obs ? u.obs + ' | ' + transferNote : transferNote;

  // 2. Retirer l'article de l'ancien index
  const oldKey = item.site + '|' + item.bat + '|' + item.etage + '|' + item.bureau;
  if (LOC_INDEX[oldKey]) {
    const idx = LOC_INDEX[oldKey].indexOf(item);
    if (idx >= 0) LOC_INDEX[oldKey].splice(idx, 1);
  }

  // 3. Déplacer l'article vers le nouveau bureau (mettre à jour emp_id ET dénormalisé)
  const newEmp = REL_EMPS[newEmpId];
  item.emp_id = newEmpId;
  item.cbe = newEmp.cbe || item.cbe;
  item.site = curLoc.site;
  item.bat = curLoc.bat;
  item.etage = curLoc.etage;
  item.bureau = curLoc.bureau;

  // 4. Ajouter au nouvel index
  const newKey = curLoc.site + '|' + curLoc.bat + '|' + curLoc.etage + '|' + curLoc.bureau;
  if (!LOC_INDEX[newKey]) LOC_INDEX[newKey] = [];
  LOC_INDEX[newKey].push(item);

  // 5. Mettre à jour l'état local
  updates[cbi] = u;

  invalidateStatsCache();
  invalidateAllItemsCache();
  invalidateCbeIndex();
  saveLocal();
  closeModal();
  renderMain();
  renderDataStatus();
  showToast('✓ Article transféré et inventorié', 'success');
  logActivity('TRANSFER', `${oldLoc} → ${curLoc.site} › ${curLoc.bat} › ${curLoc.etage} › ${curLoc.bureau}`, cbi);

  // 6. Écrire dans Supabase via writeUpd (statut TRANSFÉRÉ détecté via l'observation)
  //    On passe le nouvel emplacement et l'origine pour le modèle unifié.
  u._newEmpId = newEmpId;
  u._newCbe = newEmp.cbe || item.cbe;
  u._origEmpId = oldEmpId;
  u._loc = { site: curLoc.site, bat: curLoc.bat, etage: curLoc.etage, bureau: curLoc.bureau };
  u.marque = item.marque; u.modele = item.modele; u.serie = item.serie; u.prod = item.prod;
  await writeUpd(cbi, u);
}

// ---------- EDIT/ADD ITEMS ----------
function openEditItem_cbi(cbi) { const i = findItemByCbi(cbi); if (i) openEditItem(i); }

// ─── SUPPRESSION / RETRAIT D'UNE LIGNE D'INVENTAIRE ───
// Biens nouveaux (est_nouveau) → suppression réelle.
// Biens d'origine → statut RETIRÉ (réversible, tracé).
function confirmDeleteItem(cbi) {
  const item = findItemByCbi(cbi);
  if (!item) { showToast('Article introuvable', 'danger'); return; }
  if (item._new) {
    // Bien ajouté sur le terrain → suppression définitive
    const ok = confirm(
      `Supprimer définitivement ce bien ajouté ?\n\n` +
      `${item.art || 'Article'} — ${item.cbi}\n` +
      `${item.site} › ${item.bat} › ${item.etage} › ${item.bureau}\n\n` +
      `Cette action est irréversible.`
    );
    if (ok) doDeleteItem(cbi, true);
  } else {
    // Bien d'origine → retrait réversible (statut RETIRÉ)
    const reason = prompt(
      `Retirer ce bien de l'inventaire ?\n\n` +
      `${item.art || 'Article'} — ${item.cbi}\n` +
      `${item.site} › ${item.bat} › ${item.etage} › ${item.bureau}\n\n` +
      `Le bien sera marqué « RETIRÉ » (réversible).\n` +
      `Indiquez le motif (obligatoire) :`
    );
    if (reason === null) return;
    if (!reason.trim()) { showToast('Motif requis pour retirer un bien', 'warn'); return; }
    doDeleteItem(cbi, false, reason.trim());
  }
}

async function doDeleteItem(cbi, isReal, reason) {
  const item = findItemByCbi(cbi);
  if (!item) return;
  if (!currentUser || !navigator.onLine) { showToast('Connexion requise pour cette action', 'warn'); return; }
  if (!initSupabase()) { showToast('Connexion serveur indisponible', 'danger'); return; }
  try {
    if (isReal) {
      // Suppression réelle (bien nouveau)
      const { error } = await sb.from('inventaire').delete().eq('cbi', cbi);
      if (error) throw error;
      // Nettoyer l'état local
      const ni = newItems.findIndex(x => x.cbi === cbi);
      if (ni >= 0) newItems.splice(ni, 1);
      const di = DB.findIndex(x => x.cbi === cbi);
      if (di >= 0) DB.splice(di, 1);
      delete updates[cbi];
      delete CBI_INDEX[cbi];
      delete _CBI_NORM_INDEX[normCbi(cbi)];
      // Retirer de l'index d'emplacement
      const lk = item.site + '|' + item.bat + '|' + item.etage + '|' + item.bureau;
      if (LOC_INDEX[lk]) { const k = LOC_INDEX[lk].indexOf(item); if (k >= 0) LOC_INDEX[lk].splice(k, 1); }
      // Supprimer les photos locales associées
      try { const ph = await getPhotosLocal(cbi); for (const p of ph) await deletePhotoLocal(p.name); } catch(e) {}
      delete photos[cbi];
      logActivity('DELETE_ITEM', `${item.art || 'Article'} (nouveau) supprimé`, cbi);
      showToast('Bien supprimé', 'success');
    } else {
      // Retrait réversible (bien d'origine) → statut RETIRÉ
      const obsRetrait = `RETIRÉ le ${new Date().toLocaleDateString('fr-FR')} par ${currentUser} — Motif: ${reason}`;
      const { error } = await sb.from('inventaire').update({
        statut: 'RETIRÉ',
        observation_maj: obsRetrait,
        inventoriste: currentUser,
        date_inventaire: new Date().toISOString()
      }).eq('cbi', cbi);
      if (error) throw error;
      // Refléter localement : on garde l'objet mais on marque le statut
      item.statut = 'RETIRÉ';
      updates[cbi] = { serv: item.serv, renouv: item.renouv, obs: obsRetrait, trouve: 'NON', by: currentUser, ts: Date.now(), _retire: true };
      logActivity('REMOVE_ITEM', `${item.art || 'Article'} retiré — ${reason}`, cbi);
      showToast('Bien marqué « RETIRÉ »', 'success');
    }
    invalidateAllItemsCache();
    invalidateCbeIndex();
    invalidateStatsCache();
    saveLocal();
    closeModal();
    renderMain();
    renderDataStatus();
  } catch(e) {
    showToast('Erreur: ' + e.message, 'danger');
    console.error('doDeleteItem', e);
  }
}

// Réintègre un bien retiré (remet le statut EN ATTENTE)
async function reintegrateItem(cbi) {
  const item = findItemByCbi(cbi);
  if (!item) return;
  if (!confirm('Réintégrer ce bien dans l\'inventaire actif ?')) return;
  if (!currentUser || !navigator.onLine || !initSupabase()) { showToast('Connexion requise', 'warn'); return; }
  try {
    const { error } = await sb.from('inventaire').update({
      statut: 'EN ATTENTE', observation_maj: '', trouve: '',
      inventoriste: currentUser, date_inventaire: new Date().toISOString()
    }).eq('cbi', cbi);
    if (error) throw error;
    item.statut = 'EN ATTENTE'; item._retire = false;
    delete updates[cbi];
    invalidateAllItemsCache(); invalidateStatsCache();
    saveLocal(); closeModal(); renderMain(); renderDataStatus();
    logActivity('REINTEGRATE_ITEM', `${item.art || 'Article'} réintégré`, cbi);
    showToast('Bien réintégré', 'success');
  } catch(e) {
    showToast('Erreur: ' + e.message, 'danger');
    console.error('reintegrateItem', e);
  }
}

async function saveUpd(cbi) {
  const item = findItemByCbi(cbi);
  if (!item) return;
  const trouveEl = document.querySelector('input[name="e-trouve"]:checked');
  const u = { serv: document.getElementById('e-sv').value, renouv: document.getElementById('e-rv').value, obs: document.getElementById('e-obs').value, trouve: trouveEl ? trouveEl.value : '', by: currentUser, ts: Date.now() };

  // ── 1. Vérifier modifications des CARACTÉRISTIQUES (fam, art, marque, modèle, série) ──
  const famEl = document.getElementById('e-fam');
  const artEl = document.getElementById('e-art');
  if (famEl && artEl) {
    const newFam = famEl.value.trim();
    const newArt = artEl.value.trim();
    const newMarque = document.getElementById('e-marque').value.trim();
    const newModele = document.getElementById('e-modele').value.trim();
    const newSerie = document.getElementById('e-serie').value.trim();
    const newProd = (document.getElementById('e-prod')?.value || '').trim();
    const charChanged = (newFam !== (item.fam || '') || newArt !== (item.art || '') ||
                        newMarque !== (item.marque || '') || newModele !== (item.modele || '') ||
                        newSerie !== (item.serie || '') || newProd !== (item.prod || ''));
    if (charChanged && newFam && newArt) {
      // Créer la famille si nouvelle
      let famille_id = null;
      for (const fid in REL_FAMS) if (REL_FAMS[fid].famille_nom === newFam) { famille_id = fid; break; }
      if (!famille_id) {
        famille_id = genFamId();
        REL_FAMS[famille_id] = { famille_id, famille_nom: newFam };
        if (!FAMS[newFam]) FAMS[newFam] = [];
        if (gTok) { try { await sAppend('Familles', [[famille_id, newFam]]); } catch(e) { console.error('Echec ajout famille distante', e); } }
      }
      // Créer l'article si nouveau
      let article_id = null;
      for (const aid in REL_ARTS) if (REL_ARTS[aid].article_nom === newArt && REL_ARTS[aid].famille_id === famille_id) { article_id = aid; break; }
      if (!article_id) {
        article_id = genArtId();
        REL_ARTS[article_id] = { article_id, article_nom: newArt, famille_id, famille_nom: newFam };
        if (!FAMS[newFam].includes(newArt)) FAMS[newFam].push(newArt);
        if (gTok) { try { await sAppend('Articles', [[article_id, newArt, famille_id]]); } catch(e) { console.error('Echec ajout article distant', e); } }
      }
      // Mettre à jour l'item
      const oldArt = item.art;
      item.fam = newFam;
      item.art = newArt;
      item.article_id = article_id;
      item.marque = newMarque;
      item.modele = newModele;
      item.serie = newSerie;
      item.prod = newProd;
      // Tracer
      const charNote = `Caractéristiques modifiées (${oldArt} → ${newArt})`;
      u.obs = u.obs ? u.obs + ' | ' + charNote : charNote;
      // Mettre à jour la ligne inventaire dans Supabase
      try { await updateInventoryRow(item); } catch(e) { console.error('updateInventoryRow', e); }
      logActivity('EDIT_ITEM', `${oldArt} → ${newArt}${newMarque ? ' / ' + newMarque : ''}${newModele ? ' ' + newModele : ''}`, cbi);
    }
  }

  // ── 1b. Vérifier si la QUANTITÉ a changé (indépendamment des autres attributs) ──
  const qtyEl = document.getElementById('e-qty');
  if (qtyEl) {
    let newQty = parseInt(qtyEl.value, 10);
    if (isNaN(newQty) || newQty < 1) newQty = 1;
    if (newQty !== (item.qty || 1)) {
      const oldQty = item.qty || 1;
      item.qty = newQty;
      const qtyNote = `Quantité modifiée (${oldQty} → ${newQty})`;
      u.obs = u.obs ? u.obs + ' | ' + qtyNote : qtyNote;
      if (currentUser && navigator.onLine && sb) {
        try { await sb.from('inventaire').update({ quantite: newQty }).eq('cbi', cbi); }
        catch(e) { console.error('Echec maj quantité', e); }
      }
      logActivity('EDIT_QTY', `${item.art || 'Article'} : ${oldQty} → ${newQty}`, cbi);
    }
  }

  // ── 2. Vérifier si l'emplacement a changé ──
  const locSel = document.getElementById('e-loc');
  if (locSel && locSel.value !== locSel.dataset.original) {
    const [newSite, newBat, newEtage, newBureau] = locSel.value.split('|');
    const newEmpId = findEmpIdByLocation(newSite, newBat, newEtage, newBureau);
    if (!newEmpId) { showToast('Emplacement introuvable', 'danger'); return; }

    const oldLoc = item.site + ' › ' + item.bat + ' › ' + item.etage + ' › ' + item.bureau;
    // Retirer de l'ancien index
    const oldKey = item.site + '|' + item.bat + '|' + item.etage + '|' + item.bureau;
    if (LOC_INDEX[oldKey]) {
      const idx = LOC_INDEX[oldKey].indexOf(item);
      if (idx >= 0) LOC_INDEX[oldKey].splice(idx, 1);
    }
    // Mettre à jour l'article (emp_id + dénormalisé)
    const newEmp = REL_EMPS[newEmpId];
    item.emp_id = newEmpId;
    item.cbe = newEmp.cbe || item.cbe;
    item.site = newSite; item.bat = newBat; item.etage = newEtage; item.bureau = newBureau;
    // Ajouter au nouvel index
    const newKey = locSel.value;
    if (!LOC_INDEX[newKey]) LOC_INDEX[newKey] = [];
    LOC_INDEX[newKey].push(item);
    // Tracer dans l'observation
    const transferNote = 'TRANSFÉRÉ de ' + oldLoc + ' le ' + new Date().toLocaleDateString('fr-FR');
    u.obs = u.obs ? u.obs + ' | ' + transferNote : transferNote;
  }

  updates[cbi] = u;
  invalidateStatsCache();
  invalidateAllItemsCache();
  invalidateCbeIndex();
  saveLocal();
  closeModal();
  try { renderMain(); renderDataStatus(); } catch(e) { console.error('render après saveUpd', e); }
  showToast('✓ Article mis à jour', 'success');
  try { logActivity('INVENTORY', `${item.art || 'Article'} - ${u.serv}${u.trouve ? ' - ' + u.trouve : ''}`, cbi); } catch(e) {}
  try { await writeUpd(cbi, u); } catch(e) { console.error('writeUpd après saveUpd', e); showToast('Enregistrement distant différé', 'warn'); }
}

function openAddItem(prefilledCode) {

  const cbeVal = (prefilledCode && isCbe) ? prefilledCode : (currentLocCbe || '');

  const allArticles = [];

        <div class="form-group">
          <label class="form-label">Code barre IMMO *</label>

          <div id="n-cbi-msg" style="display:none"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Code barre EMP</label>

        </div>
